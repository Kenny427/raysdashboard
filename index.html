/* Typography balance pass: cleaner numeric face + centered KPI content */
.card.kpi{
  min-height:112px;
  padding:17px 19px 16px 17px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:stretch;
  gap:8px;
}
.kpi .l,.label,.statBox .l,.summaryStat .l,th{
  font-family:"Segoe UI Variable Display","Segoe UI",Inter,Geist,-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
  font-size:11px;
  line-height:1.18;
  letter-spacing:.05em;
  font-weight:900;
  color:#aeb8c8;
}
.kpi .v,.statBox .v,.summaryStat .v,.heroPrice{
  font-family:"Segoe UI Variable Display","Segoe UI",Inter,Geist,-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
  font-variant-numeric:tabular-nums lining-nums;
  font-feature-settings:"tnum" 1,"lnum" 1;
  letter-spacing:-.025em;
  text-rendering:geometricPrecision;
}
.kpi .v{
  font-size:27px;
  line-height:1.0;
  font-weight:850;
  margin:0;
}
.kpi .n{
  font-size:12.5px;
  line-height:1.28;
  color:#bac5d3;
  margin-top:-2px;
}
.statsKpiGrid .card.kpi{min-height:112px}
.four .card.kpi,.liveKpiGrid .card.kpi{min-height:106px}
.marketSpeedCard{padding:18px!important}
.marketSpeedCard .label{margin-bottom:3px}
.marketSpeedCard b{font-weight:760;line-height:1.2}
.title{
  line-height:1.25;
  padding:2px 0 3px;
  font-weight:780;
  letter-spacing:-.025em;
}
.bar{padding:16px 0}
@media(max-width:1180px){.bar,.wrap{width:min(100% - 28px,1520px)}.statsKpiGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.four,.liveKpiGrid,.bestWorstGrid,.twocol,.itemTopGrid,.itemPageGrid{grid-template-columns:1fr}.itemPageRight{position:static}.itemStatsGrid,.tradingSnapshotGrid,.performanceStatsGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.summaryStat:nth-child(n){border-right:1px solid var(--line)}.detailGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.globalSearch{min-width:240px}}

/* ── New design overrides ── */

/* Hide old sticky header */
.top{display:none!important}

/* Topbar: logo + nav tabs + right controls */
.topbar{
  position:sticky;top:0;z-index:20;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 48px;display:flex;align-items:center;justify-content:space-between;
  height:60px;flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;}
.topbar-logo{
  font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.3px;
  font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;
  padding-right:32px;margin-right:32px;border-right:1px solid var(--border);
  white-space:nowrap;
}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:12px;}

/* Nav tabs inside topbar */
.nav{
  display:flex;align-items:center;gap:2px;
  margin:0;padding:0;background:none;border:none;border-radius:0;flex-wrap:nowrap;
}
.nav button{
  padding:8px 18px;font-size:13px;font-weight:600;
  color:var(--muted)!important;background:transparent!important;
  border:none!important;border-radius:8px!important;cursor:pointer;
  font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;transition:all .15s;
  white-space:nowrap;
}
.nav button:hover{color:var(--text)!important;background:var(--card)!important;}
.nav button.active{color:var(--text)!important;background:var(--card2)!important;}

/* Fetch time label */
.fetch-tag{font-family:'DM Mono',monospace;font-size:12px;color:var(--dimmed);white-space:nowrap;}

/* Refresh icon button */
.topbar-refresh{
  background:transparent!important;border:1px solid var(--border2)!important;color:var(--muted)!important;
  width:34px;height:34px;border-radius:8px!important;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  padding:0;flex-shrink:0;
}
.topbar-refresh:hover{color:var(--text)!important;border-color:var(--accent2)!important;}
.topbar-refresh svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}

/* Toolbar: date range */
.toolbar-row{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 48px;display:flex;align-items:center;gap:4px;
  flex-wrap:wrap;margin:0!important;border-radius:0!important;
}
.toolbar-row.compactRanges{background:var(--surface)!important;border:none!important;border-bottom:1px solid var(--border)!important;border-radius:0!important;padding:10px 48px!important;margin:0!important;}
.compactRanges .label,.toolbar-row .label{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dimmed);margin-right:10px;
}
.ranges button[data-range],#customToggleBtn{
  padding:7px 16px;font-size:12px;font-weight:600;color:var(--muted);
  background:transparent!important;border:1px solid transparent!important;border-radius:7px!important;
  cursor:pointer;font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;transition:all .15s;
}
.ranges button[data-range]:hover,#customToggleBtn:hover{color:var(--text)!important;border-color:var(--border)!important;}
.ranges button.active,#customToggleBtn.active{
  color:var(--accent)!important;border-color:var(--accent2)!important;
  background:rgba(0,217,166,.06)!important;
}
/* Custom date-range picker — match dark theme */
.customRangePanel input[type="datetime-local"]{
  color-scheme:dark;
  background:rgba(7,16,29,.95)!important;border:1px solid var(--line)!important;color:var(--text)!important;
  border-radius:8px!important;padding:7px 10px!important;font-size:12px;outline:none;min-width:172px;
}
.customRangePanel input[type="datetime-local"]:hover{border-color:var(--border2)!important;}
.customRangePanel input[type="datetime-local"]:focus{border-color:rgba(125,211,252,.45)!important;box-shadow:0 0 0 3px rgba(125,211,252,.08)!important;}
.customRangePanel input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(.72);opacity:.6;cursor:pointer}
.customRangePanel input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover{opacity:1}
#customBtn{
  padding:7px 16px!important;font-size:12px!important;font-weight:800!important;border-radius:8px!important;
  background:linear-gradient(180deg,rgba(0,230,168,.95),rgba(34,197,94,.85))!important;color:#02110d!important;
  border:1px solid rgba(0,230,168,.38)!important;cursor:pointer;
}
#customBtn:hover{border-color:rgba(0,230,168,.7)!important;color:#001b14!important;}

/* Main content wrap — same 48px side padding as topbar/toolbar */
.wrap{
  width:100%!important;max-width:1800px!important;
  margin:0 auto!important;
  padding:28px 48px 56px!important;
  box-sizing:border-box;
}
/* Give #app flex column with consistent gap between sections */
#app{display:flex;flex-direction:column;gap:28px;}

/* Flat cards — no gradient */
.card,.bigItemCard,.marketSpeedCard,.liveSellSummary,.bankrollUnrealized,.marketSearchCard{
  background:var(--card)!important;border:1px solid var(--border)!important;
  border-radius:14px!important;box-shadow:none!important;
}
.card:hover,.bigItemCard:hover{border-color:var(--border2)!important;}
/* Blocklist tab — clean blocklist generator */
.blPage{display:flex;flex-direction:column;gap:14px;font-size:13px}
.blHeader{display:flex;flex-direction:column;gap:14px}
.blHeadTop{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.blTitle{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--text);display:flex;align-items:center;gap:9px}
.blSub{font-size:11.5px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.blSubPath{max-width:520px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blSyncPill{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--green);border:1px solid rgba(0,217,166,.28);background:rgba(0,217,166,.09);border-radius:999px;padding:3px 9px}

.blAddWrap{position:relative}

.blAddResults{position:absolute;z-index:50;top:52px;left:0;right:0;max-height:380px;overflow:auto;background:rgba(5,10,18,.99);border:1px solid var(--line2);border-radius:14px;box-shadow:var(--shadow)}
.blAddRow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 13px;border-bottom:1px solid var(--line)}
.blAddRow:last-child{border-bottom:0}
.blAddRow:hover{background:rgba(125,211,252,.05)}
.blAddName{display:flex;align-items:center;gap:10px;min-width:0;font-weight:700}
.blAddName span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blAddMeta{display:flex;align-items:center;gap:9px;flex-shrink:0}
.blStatus{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:999px}
.blStatus.blocked{color:var(--red);border:1px solid rgba(255,77,90,.28);background:rgba(255,77,90,.08)}
.blStatus.allowed{color:var(--green);border:1px solid rgba(0,217,166,.28);background:rgba(0,217,166,.09)}
.blKpiStrip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.blKpi{padding:14px 16px!important;min-height:80px!important;display:flex!important;flex-direction:column;gap:5px}
.blKpi .l{font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;font-size:10px!important;letter-spacing:1.5px!important;color:var(--muted);text-transform:uppercase;font-weight:700}
.blKpi .v{font-family:'DM Mono',monospace;font-variant-numeric:tabular-nums lining-nums;font-size:24px!important;line-height:1!important;font-weight:500;letter-spacing:-.02em}
.blKpi .n{font-size:11px!important;color:var(--muted)}
.blToolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 14px!important}
.blProfileBar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.blProfileBar label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:800;color:var(--muted)}
.blProfileSelect{background:rgba(7,16,29,.95);border:1px solid var(--line2);color:var(--text);border-radius:10px;padding:8px 11px;font-weight:700;cursor:pointer;max-width:320px}
.blProfileSelect:hover{border-color:var(--border2)}
.blSeg{display:inline-flex;background:rgba(7,16,29,.6);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px}
.blSeg button{border:0!important;background:transparent!important;border-radius:9px!important;padding:8px 15px!important;font-weight:800;color:var(--muted)!important}
.blSeg button.active.allow{background:rgba(0,217,166,.14)!important;color:#7ff0d0!important;box-shadow:inset 0 1px rgba(255,255,255,.05)}
.blSeg button.active.block{background:rgba(255,77,90,.14)!important;color:#ffb3b9!important;box-shadow:inset 0 1px rgba(255,255,255,.05)}
.blSearch{flex:1;min-width:200px;height:40px}
.blChips{display:flex;gap:7px;flex-wrap:wrap}
.blChip{padding:8px 12px!important;font-size:11.5px!important;border-radius:999px!important}
.blChip.active{background:rgba(125,211,252,.13)!important;border-color:rgba(125,211,252,.34)!important;color:#e0f7ff!important}
.blTableCard{padding:0!important;overflow:hidden}
.blTableWrap{max-height:660px;overflow:auto}
.blTableCard table{font-size:12.5px}
.blTableCard thead th{position:sticky;top:0;background:rgba(9,14,22,.99);z-index:2}
.blTableCard td,.blTableCard th{padding:9px 12px}
.blTableCard tbody tr:hover{background:rgba(125,211,252,.04)}
.blFoot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 14px;border-top:1px solid var(--line);color:var(--muted);font-size:11.5px}
.blAct{font-size:11px!important;padding:6px 13px!important;border-radius:8px!important;font-weight:800!important}
.blAct.block{background:linear-gradient(180deg,#ff646f,#c0392b)!important;color:#fff!important;border-color:transparent!important}
.blAct.allow{background:linear-gradient(180deg,#43d17a,#229954)!important;color:#04140c!important;border-color:transparent!important}
.blAct:disabled{opacity:.45;cursor:default}
@media(max-width:1100px){.blKpiStrip{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.blKpiStrip{grid-template-columns:1fr}.blToolbar{flex-direction:column;align-items:stretch}.blSeg{justify-content:center}}
/* Monospace numerals in data tables (blocklist + research) for a clean ledger look */
.blTableCard td.num,.resBadge+*,.blKpiStrip~.blTableCard td.num{font-family:'DM Mono',monospace;font-variant-numeric:tabular-nums}
.blTableCard .itemCell span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px}
.resBadge{display:inline-flex;align-items:center;font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;border-radius:6px;margin-left:7px;flex:0 0 auto}
.resBadge.blk{color:var(--red);border:1px solid rgba(255,77,90,.3);background:rgba(255,77,90,.09)}
.resBadge.mine{color:var(--green);border:1px solid rgba(0,217,166,.3);background:rgba(0,217,166,.09)}
.resBadge.mem{color:var(--amber);border:1px solid rgba(245,166,35,.3);background:rgba(245,166,35,.09)}
/* Item page: flip-signal strip */
.flipSignal{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.flipCell{background:linear-gradient(180deg,rgba(15,23,36,.5),rgba(7,16,29,.3));padding:13px 15px;min-height:78px;display:flex;flex-direction:column;gap:4px}
.flipCell .l{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.flipCell .v{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;letter-spacing:-.02em;line-height:1.05}
.flipCell .s{font-size:11px;color:var(--muted)}
.flipCell.hl{background:linear-gradient(180deg,rgba(0,217,166,.08),rgba(0,217,166,.02))}
.itemActionBar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.blockToggle{font-size:12px!important;font-weight:800!important;padding:9px 16px!important;border-radius:10px!important}
.blockToggle.isBlocked{background:linear-gradient(180deg,#43d17a,#229954)!important;color:#04140c!important;border-color:transparent!important}
.blockToggle.notBlocked{background:linear-gradient(180deg,#ff646f,#c0392b)!important;color:#fff!important;border-color:transparent!important}
.statusTag{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--muted)}
.statusTag .dot{width:8px;height:8px;border-radius:999px}
.acctBars{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.acctBar{display:grid;grid-template-columns:92px 1fr auto;gap:10px;align-items:center;font-size:12px}
.acctBar .nm{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acctBar .track{height:7px;border-radius:999px;background:rgba(130,146,166,.12);overflow:hidden}
.acctBar .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.acctBar .val{font-family:'DM Mono',monospace;font-size:11.5px;text-align:right;min-width:64px}
.hourStrip{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;align-items:end;height:54px;margin-top:8px}
.hourBar{background:rgba(0,217,166,.22);border-radius:2px 2px 0 0;min-height:2px}
.hourBar.best{background:var(--accent)}
.hourAxis{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);margin-top:3px}
/* Flip-record KPIs: fit the narrow right column (override global .four) */
.itemPageRight .grid.four.flipKpis{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:10px!important}
.itemPageRight .flipKpis .kpi{min-height:84px;padding:13px 14px}
.itemPageRight .flipKpis .kpi .v{font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itemPageRight .flipKpis .kpi .l{margin-bottom:8px}
.itemPageRight .flipKpis .kpi .n{font-size:11px;margin-top:6px}
/* Compact, no-scroll item page: charts side by side, stats side by side */
.itemChartsRow{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.itemChartsRow .chartCard{margin-bottom:0;padding:13px}
.itemStatsRow{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.itemStatsCol .section:first-child{margin-top:12px}
.itemPage .section{margin:14px 0 8px}
.itemPage .summaryStat,.itemPage .statBox{min-height:70px;padding:11px 13px}
.itemPage .summaryStat .v,.itemPage .statBox .v{margin-top:5px}
.itemPage{margin-bottom:16px}
.itemPage .backLink{margin:4px 0 10px}
@media(max-width:1180px){.itemChartsRow,.itemStatsRow{grid-template-columns:1fr}}
/* Interactive hover for item-page charts (price + volume) */
.hoverChart{cursor:crosshair}
.chartGuide{position:fixed;width:1px;margin-left:-.5px;z-index:60;pointer-events:none;opacity:0;transition:opacity .08s}
.chartDot{position:fixed;width:9px;height:9px;border-radius:50%;z-index:61;pointer-events:none;opacity:0;transform:translate(-50%,-50%);box-shadow:0 0 0 2px var(--bg);transition:opacity .08s}
.chartTip{position:fixed;z-index:62;pointer-events:none;opacity:0;background:var(--card2);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;line-height:1.5;padding:6px 10px;border-radius:8px;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.5);transition:opacity .08s}
.chartTip b{color:var(--text);font-weight:600}.chartTip .muted{color:var(--muted);font-size:10px}
.pace-faint{opacity:.6}.pace-faint b{color:var(--muted)}
/* Auto-sync live indicator */
.liveSync{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--muted);padding:5px 10px;border:1px solid var(--line);border-radius:999px;white-space:nowrap;font-variant-numeric:tabular-nums;cursor:pointer;transition:border-color .15s}
.liveSync:hover{border-color:var(--border2)}
.liveSync .ldot{width:7px;height:7px;border-radius:999px;background:var(--muted);flex:0 0 auto}
.liveSync.live{color:#7ff0d0;border-color:rgba(0,217,166,.3);background:rgba(0,217,166,.08)}
.liveSync.live .ldot{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:syncPulse 1.6s infinite}
.liveSync.syncing{color:#cbd5e1;border-color:rgba(125,211,252,.3)}
.liveSync.syncing .ldot{background:var(--blue);animation:syncPulse .9s infinite}
.liveSync.offline{color:var(--amber);border-color:rgba(245,166,35,.32);background:rgba(245,166,35,.08)}
.liveSync.offline .ldot{background:var(--amber)}
.liveSync.justSynced{color:#7ff0d0!important;border-color:rgba(0,217,166,.55)!important;background:rgba(0,217,166,.16)!important;transition:none}
.settingsSeg{display:flex;width:100%;margin:14px 0 8px}
.settingsSeg button{flex:1;text-align:center}
.adjWithdraw{background:linear-gradient(180deg,#ff646f,#c0392b)!important;color:#fff!important;border-color:transparent!important;font-weight:800!important}
.adjWithdraw:hover{opacity:.88;color:#fff!important}
.kpiIco{width:13px;height:13px;vertical-align:-2px;margin-right:6px;opacity:.42;flex:0 0 auto}
.gpCard{position:relative}
.gpModes{position:absolute;top:7px;right:7px;display:flex;align-items:center;gap:3px;z-index:3}
.gpMode{padding:2px 7px!important;font-size:9.5px!important;font-weight:800!important;border-radius:6px!important;opacity:.5;line-height:1.5}
.gpMode:hover{opacity:.85}
.gpMode.on{opacity:1;background:rgba(0,217,166,.14)!important;color:#7ff0d0!important;border-color:rgba(0,217,166,.32)!important}
.gpReset{width:21px;height:21px;padding:0!important;border-radius:6px!important;font-size:12px;display:grid;place-items:center;opacity:.6}
.gpReset:hover{opacity:1;color:var(--accent)!important}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-refresh.spinning svg{animation:spinRefresh .8s linear infinite}
@keyframes spinRefresh{to{transform:rotate(360deg)}}
/* Bankroll tab */
.kpi .v.plain{color:var(--text)!important}
.bankrollKpis{grid-template-columns:repeat(5,minmax(0,1fr))!important}
@media(max-width:1180px){.bankrollKpis{grid-template-columns:repeat(2,minmax(0,1fr))!important}}
@media(max-width:680px){.bankrollKpis{grid-template-columns:1fr!important}}
.allocBar{display:flex;height:18px;border-radius:8px;overflow:hidden;gap:2px;margin-bottom:14px;background:rgba(130,146,166,.1)}
.allocSeg{height:100%;min-width:3px;transition:opacity .15s}.allocSeg:hover{opacity:.78}
.allocList{display:flex;flex-direction:column;gap:1px}
.allocRow{display:grid;grid-template-columns:14px minmax(0,1.5fr) 58px minmax(0,1fr) 72px;gap:12px;align-items:center;font-size:12.5px;padding:7px 4px;border-bottom:1px solid var(--line)}
.allocRow:last-child{border-bottom:0}
.allocDot{width:10px;height:10px;border-radius:3px}
.allocNm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);font-weight:600}
.allocShare,.allocVal,.allocRoi{font-family:'DM Mono',monospace;text-align:right}
.allocShare{color:var(--muted)}.allocRoi{font-weight:700}
.acctProfitBar{height:6px;border-radius:999px;background:rgba(130,146,166,.12);overflow:hidden;margin:2px 0 4px}
.acctProfitFill{height:100%;border-radius:999px}
.acctProfitFill.green{background:linear-gradient(90deg,var(--accent2),var(--accent))}
.acctProfitFill.red{background:linear-gradient(90deg,#c0392b,#ff646f)}

/* KPI card sizing — match reference */
.card.kpi{
  padding:22px 24px!important;
  min-height:120px!important;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-start;gap:0;
}
.kpi .l{
  font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dimmed);margin-bottom:12px;
}
.kpi .v{
  font-family:'DM Mono',monospace;
  font-size:26px;font-weight:500;line-height:1;
  letter-spacing:-.02em;color:var(--text);margin:0;
}
.kpi .n{font-size:12px;color:var(--muted);margin-top:8px;}

/* Grid gaps — all grids use 16px */
.grid{gap:16px!important;}
.statsKpiGrid,.kpis{grid-template-columns:repeat(5,minmax(0,1fr))!important;gap:16px!important;}
.four{grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:16px!important;}
.liveKpiGrid{grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:16px!important;}
.bestWorstGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px!important;}
.twocol{grid-template-columns:repeat(2,minmax(0,1fr))!important;}

/* Section headers — tight, 0 top margin (gap handles spacing) */
.section{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin:0 0 14px;
}
.label,.statBox .l,.summaryStat .l,th{
  font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dimmed);
}

/* Table rows */
tbody tr.clickable-row{border-left:3px solid transparent;transition:background .1s;}
tbody tr.clickable-row:hover{background:var(--card2);}
td{color:var(--text);font-size:13px;}
th{color:var(--dimmed);}
th,td{border-bottom-color:var(--border);}

/* Pill badges */
.pill{border-radius:6px;}
.pill.ok{color:var(--accent);border-color:rgba(0,217,166,.25);background:rgba(0,217,166,.1);}
.pill.warn{color:var(--amber);border-color:rgba(245,166,35,.25);background:rgba(245,166,35,.08);}

/* Search input */
.search,.input,.globalSearch input,.field input,.field select,.field textarea{
  background:var(--card2)!important;border-color:var(--border)!important;border-radius:8px!important;
}
.search:focus,.globalSearch input:focus{border-color:var(--accent2)!important;box-shadow:0 0 0 3px rgba(0,217,166,.08)!important;}
.searchResults{background:var(--card)!important;border-color:var(--border2)!important;border-radius:12px!important;}
.searchResult{border-bottom-color:var(--border)!important;}

/* Buttons — default */
button{
  font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;
  border-color:var(--border)!important;background:var(--card2)!important;
  color:var(--muted)!important;border-radius:8px!important;
}
button:hover{border-color:var(--border2)!important;color:var(--text)!important;background:var(--card)!important;}
button.save,.save,button.primary,.primary{
  background:var(--accent)!important;color:#001a12!important;
  border-color:transparent!important;font-weight:700!important;box-shadow:none!important;
}
button.save:hover,.save:hover{opacity:.85;}
.sorts button.active,.chartRangeControls button.active{
  background:var(--card2)!important;color:var(--text)!important;border-color:var(--border2)!important;
}

/* Item page */
.itemHeroCard,.itemMarketPrice,.chartCard{
  background:var(--card)!important;border-color:var(--border)!important;border-radius:14px!important;box-shadow:none!important;
}
.itemStatsGrid{background:var(--card2)!important;border-color:var(--border)!important;}
.summaryStat,.statBox{background:var(--card)!important;border-color:var(--border)!important;}
.statBox .v,.summaryStat .v{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;}
.heroPrice{font-family:'DM Mono',monospace;}

/* Modal */
.modal-box{background:var(--card);border:1px solid var(--border);}

/* Bankroll cards */
.bankrollHead .section{margin:0;}
.marketSpeedCard{display:none!important;}/* hide old card — we use .pace now */

/* ── Pace bar (market speed) ── */
.pace{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 28px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
.pace-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.35}}
.pace-status{font-size:13px;font-weight:700;margin-right:10px;}
.pace-pipe{width:1px;height:24px;background:var(--border2);margin:0 16px;flex-shrink:0;}
.pace-item{font-size:13px;color:var(--muted);}
.pace-item b{color:var(--text);font-weight:600;}

/* ── Selling banner ── */
.selling{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 22px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s;}
.selling:hover{border-color:var(--border2);}
.selling-badge{background:rgba(0,217,166,.1);color:var(--accent);font-family:'DM Mono',monospace;font-size:13px;padding:4px 12px;border-radius:6px;border:1px solid rgba(0,217,166,.2);}
.selling-text{font-size:13px;font-weight:600;color:var(--text);}
.selling-sub{font-size:12px;color:var(--muted);margin-left:auto;}

/* ── New tbl-card / div-grid item rows ── */
.tbl-card{background:var(--card)!important;border:1px solid var(--border)!important;border-radius:14px!important;overflow:hidden;box-shadow:none!important;}
.tbl-head{padding:14px 22px;border-bottom:1px solid var(--border);}
.tbl-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:8px;font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;}
.tbl-title.g{color:var(--accent);}
.tbl-title.r{color:var(--red);}
.tbl-title svg{flex-shrink:0;}
.col-heads{display:grid;grid-template-columns:1fr 32px 90px 52px 90px;gap:8px;padding:8px 22px 8px 25px;border-bottom:1px solid var(--border);}
.col-h{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dimmed);}
.col-h:not(:first-child){text-align:right;}
.trow{display:grid;grid-template-columns:1fr 32px 90px 52px 90px;gap:8px;padding:10px 22px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .1s;border-left:3px solid transparent;}
.trow:last-child{border-bottom:none;}
.trow:hover{background:var(--card2);}
.trow.win-full{border-left-color:rgba(0,217,166,.45);}
.trow.win-half{border-left-color:rgba(255,77,90,.3);}
.trow.win-none{border-left-color:rgba(255,77,90,.45);}
.trow.highlight-loss{background:rgba(255,77,90,.05);}
.trow.highlight-loss:hover{background:rgba(255,77,90,.09);}
.item-cell{display:flex;align-items:center;gap:10px;min-width:0;}
.icon-wrap{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--card2);border-radius:6px;border:1px solid var(--border2);}

  }

  let rs=(mode==='session'&&lr.session_rate_series)?lr.session_rate_series:(lr.rate_series||{});

  let controls=`<div class="gpModes"><button class="gpMode ${mode==='live'?'on':''}" title="Smoothed live rate (no timer)" onclick="event.stopPropagation();setGpMode('live')">Live</button><button class="gpMode ${mode==='session'?'on':''}" title="Exact GP/hr since you hit reset" onclick="event.stopPropagation();setGpMode('session')">Session</button>${mode==='session'?`<button class="gpReset" title="Reset timer to now" onclick="event.stopPropagation();resetGpSession()">⟲</button>`:''}</div>`;

const ALLOC_PALETTE=['#00d9a6','#58a6ff','#a78bfa','#f5a623','#ff646f','#43d17a','#e879f9','#2dd4bf'];
function neutralKpi(label,value,note){return `<div class="card kpi"><div class="l">${kpiIcon(label)}${esc(label)}</div><div class="v plain">${fmt(value)}</div>${note?`<div class="n">${esc(note)}</div>`:''}</div>`}
function bankrollChart(vals,times){
  if(!vals||vals.length<2)return '<div class="empty">No bankroll history yet</div>';
  let min=Math.min(...vals),max=Math.max(...vals),pad=Math.max(1,(max-min)*0.08),lo=min-pad,hi=max+pad;
  let w=920,h=240,leftPad=92,bottomPad=34,plotW=w-leftPad-12,span=hi-lo||1;
  let xy=(v,i)=>[Math.round(leftPad+i/(vals.length-1)*plotW),Math.round(h-bottomPad-(v-lo)/span*(h-bottomPad-12))];
  let coords=vals.map((v,i)=>xy(v,i).join(',')).join(' ');
  let area=`${leftPad},${h-bottomPad} ${coords} ${leftPad+plotW},${h-bottomPad}`;
  let ticks=[max,(max+min)/2,min].map(v=>{let y=xy(v,0)[1];return `<g><line x1="${leftPad}" x2="${w-12}" y1="${y}" y2="${y}" stroke="rgba(130,146,166,.16)"/><text x="${leftPad-8}" y="${Math.max(12,y-6)}" fill="var(--muted)" font-size="13" font-weight="700" text-anchor="end">${fmtAxisGp(v)}</text></g>`}).join('');
  let labelT=(idx,anchor)=>{let x=xy(vals[idx],idx)[0];return `<text x="${x}" y="${h-8}" fill="var(--muted)" font-size="12" text-anchor="${anchor}">${esc(times[idx]?dt(times[idx]):'')}</text>`};
  let mid=Math.floor((vals.length-1)/2),xlabels=`${labelT(0,'start')}${labelT(mid,'middle')}${labelT(vals.length-1,'end')}`;
  let hoverPts=vals.map((v,i)=>{let[x,y]=xy(v,i);return {x,y,l:`<b>${fmtGp(v)}</b><div class="muted">${esc(times[i]?dt(times[i]):'')}</div>`}});
  let up=vals[vals.length-1]>=vals[0],col=up?'#00d9a6':'#ff646f';
  return `<div class="chartTitle"><b>Total bankroll</b><span class="compactNote">across active accounts · since baseline</span></div><svg class="bankrollChart hoverChart" viewBox="0 0 ${w} ${h}" style="width:100%;height:250px" data-color="${col}" data-points="${esc(JSON.stringify(hoverPts))}">${ticks}<g>${xlabels}</g><polygon points="${area}" fill="${up?'rgba(0,217,166,.08)':'rgba(255,100,111,.08)'}"/><polyline points="${coords}" fill="none" stroke="${col}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function renderBankrollGrowth(trend){
  let vals=(trend&&trend.values)||[],times=(trend&&trend.times)||[];
  if(vals.length<2)return '';
  let chg=num(trend.end)-num(trend.start),chgPct=trend.start?chg/trend.start*100:0;
  return `<div class="section">Bankroll growth</div><div class="card chartCard">${bankrollChart(vals,times)}<div class="compactNote" style="margin-top:8px"><span class="${cls(chg)}">${cls(chg)==='green'?'▲':'▼'} ${fmt(chg)} (${pct(chgPct)})</span> since baseline · now ${fmtGp(trend.end)}</div></div>`;
}

function renderBankrollLedger(ledger){
  ledger=(ledger||[]).slice().reverse();
  if(!ledger.length)return '';
  let rows=ledger.map(e=>{
    let detail=e.type==='transfer'?`${esc(e.from||'?')} → ${esc(e.to||'?')}`:esc(e.account||e.note||'');

function volumeChart(points){/* Legacy test string: Market depth */let rows=(points||[]).slice(-72),vals=rows.map(p=>num(p.highPriceVolume)+num(p.lowPriceVolume));if(!vals.length)return'<div class="empty">No volume data</div>';let max=Math.max(...vals,1),plotW=720,h=130,volumeLeftPad=72,volumeBottomPad=34,w=plotW+volumeLeftPad+12,bw=plotW/vals.length;let bars=vals.map((v,i)=>`<rect class="pointHit" onclick="selectVolumePoint(${i})" x="${Math.round(volumeLeftPad+i*bw)}" y="${Math.round(h-(v/max*h))}" width="${Math.max(2,Math.floor(bw-1))}" height="${Math.round(v/max*h)}" fill="${ITEM_VOLUME_SELECTED===i?'var(--amber)':i%2?'rgba(88,166,255,.72)':'rgba(67,209,122,.72)'}" rx="2"><title>${esc(pointTime(rows[i]))} · ${fmt(v)} volume</title></rect>`).join('');let volumeTicks=[max,max/2,0].map(v=>{let y=Math.round(h-(v/max*h));return `<g><line x1="${volumeLeftPad}" x2="${volumeLeftPad+plotW}" y1="${y}" y2="${y}" stroke="rgba(130,146,166,.13)"/><text x="${volumeLeftPad-8}" y="${Math.max(12,y-4)}" fill="var(--muted)" font-size="12" text-anchor="end">${v===0?'0':fmt(v)}</text></g>`}).join('');let labelAt=(idx,anchor)=>{let p=rows[idx],x=Math.round(volumeLeftPad+idx*bw);return `<text x="${x}" y="${h+volumeBottomPad-8}" fill="var(--muted)" font-size="12" font-weight="650" text-anchor="${anchor}">${esc(pointTime(p))}</text>`};let mid=Math.floor((rows.length-1)/2);let volumeXAxisLabels=`<g class="volumeXAxisLabels">${labelAt(0,'start')}${labelAt(mid,'middle')}${labelAt(rows.length-1,'end')}</g>`;let hoverPts=rows.map((p,i)=>{let v=num(p.highPriceVolume)+num(p.lowPriceVolume);return {x:volumeLeftPad+i*bw+bw/2,y:Math.round(h-(v/max*h)),l:`<b>${fmt(v)} vol</b><div class="muted">buy ${fmt(num(p.highPriceVolume))} · sell ${fmt(num(p.lowPriceVolume))}</div><div class="muted">${esc(pointTime(p))}</div>`}});return `<div class="chartTitle"><b>Buy/Sell Volume</b><span class="compactNote">${chartBucketLabel()} volume buckets <span class="volumeLegend"><span><i class="legendDot buyDot"></i>Bu function combinedChart(points,cw,ch){
  let pts=(points||[]).filter(p=>chartMidPrice(p)), vals=pts.map(chartMidPrice);
  if(vals.length<2)return '<div class="empty">No chart data</div>';
  let vols=pts.map(p=>num(p.highPriceVolume)+num(p.lowPriceVolume));
  let pmin=Math.min(...vals),pmax=Math.max(...vals),pad=Math.max(1,(pmax-pmin)*0.08),lo=pmin-pad,hi=pmax+pad,span=hi-lo||1;
  let vmax=Math.max(...vols,1);
  // cw/ch: actual card pixel size from fitItemChart so text renders 1:1 (no shrunken fonts)
  let w=cw||1180,h=ch||520,leftPad=92,rightPad=14,topPad=16,xAxisPad=30,volBandH=Math.max(60,Math.round(h*0.15)),gap=20;
  let plotW=w-leftPad-rightPad;
  let volBottom=h-xAxisPad, volTop=volBottom-volBandH, priceBottom=volTop-gap, priceTop=topPad;
  let n=vals.length;
  let px=i=>Math.round(leftPad+(n>1?i/(n-1):0)*plotW);
  let py=v=>Math.round(priceBottom-(v-lo)/span*(priceBottom-priceTop));
  let coords=vals.map((v,i)=>px(i)+','+py(v)).join(' ');
  let areaPts=`${px(0)},${priceBottom} ${coords} ${px(n-1)},${priceBottom}`;
  let priceTicks=[pmax,(pmax+pmin)/2,pmin].map(v=>{let y=py(v);return `<g><line x1="${leftPad}" x2="${w-rightPad}" y1="${y}" y2="${y}" stroke="rgba(130,146,166,.16)"/><text x="${leftPad-8}" y="${Math.max(12,y-6)}" fill="var(--muted)" font-size="13" font-weight="700" text-anchor="end">${fmtAxisGp(v)}</text></g>`}).join('');
  let step=plotW/Math.max(1,n-1), barW=Math.max(1,Math.floor(Math.min(step*0.7,14)));
  let bars=vols.map((v,i)=>{let bh=Math.max(0,Math.round(v/vmax*volBandH));return `<rect x="${px(i)-Math.floor(barW/2)}" y="${volBottom-bh}" width="${barW}" height="${bh}" fill="rgba(88,166,255,.42)" rx="1"></rect>`}).join('');
  let volLabels=`<text x="${leftPad-8}" y="${volTop+11}" fill="var(--muted)" font-size="11" text-anchor="end">${fmt(vmax)}</text><text x="${leftPad-8}" y="${volBottom}" fill="var(--muted)" font-size="11" text-anchor="end">vol</text>`;
  let divider=`<line x1="${leftPad}" x2="${w-rightPad}" y1="${volTop-gap/2}" y2="${volTop-gap/2}" stroke="rgba(130,146,166,.10)"/>`;
  let labelAt=(idx,anchor)=>`<text x="${px(idx)}" y="${h-8}" fill="var(--muted)" font-size="12" font-weight="650" text-anchor="${anchor}">${esc(pointTime(pts[idx]))}</text>`;
  let mid=Math.floor((n-1)/2);
  let xLabels=`<g class="chartXAxisLabels">${labelAt(0,'start')}${labelAt(mid,'middle')}${labelAt(n-1,'end')}</g>`;
  let hit=pts.map((p,i)=>`<circle class="pointHit" onclick="selectChartPoint(${i})" cx="${px(i)}" cy="${py(vals[i])}" r="7" fill="transparent"></circle>`).join('');
  let hoverPts=pts.map((p,i)=>({x:px(i),y:py(vals[i]),l:`<b>${fmtGp(vals[i])}</b><div class="muted">vol ${fmt(vols[i])} · buy ${fmt(num(p.highPriceVolume))} · sell ${fmt(num(p.lowPriceVolume))}</div><div class="muted">${esc(pointTime(p))}</div>`}));
  return `<div class="chartTitle"><b>Price &amp; volume</b><span class="compactNote">${ITEM_CHART_RANGE} · ${chartBucketLabel()} · line = price · bars = volume</span></div><svg class="priceChart hoverChart" viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;aspect-ratio:${w}/${h}" data-color="#00d9a6" data-points="${esc(JSON.stringify(hoverPts))}">${priceTicks}<g class="volBand">${volLabels}${bars}</g>${divider}<polyline points="${areaPts}" fill="rgba(0,217,166,.06)" stroke="none"/><polyline points="${coords}" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${hit}${xLabels}</svg>${selectedPriceDetail(pts)}`;
}

function ffNum(s){let v=String(s||'').trim().toLowerCase().replace(/,/g,'');if(!v)return null;let m=v.match(/^([0-9.]+)\s*([kmb])?$/);if(!m)return null;let n=parseFloat(m[1]);if(isNaN(n))return null;return Math.round(n*(m[2]==='b'?1e9:m[2]==='m'?1e6:m[2]==='k'?1e3:1))}
function ffAge(s){if(s===null||s===undefined)return'—';if(s<60)return s+'s';if(s<3600)return Math.round(s/60)+'m';return (s/3600).toFixed(1)+'h'}
function ffTrend(v){if(v===null||v===undefined)return'<span class="muted">—</span>';let c=v>0.5?'green':v<-0.5?'red':'muted',a=v>0.5?'▲':v<-0.5?'▼':'·';return `<span class="${c}">${a}${Math.abs(v).toFixed(1)}%</span>`}
function ffFlags(x){return (x.flags||[]).map(f=>{let i=FF_FLAG_INFO[f];return i?`<span class="ffFlag ${f}" title="${esc(i[1])}">${i[0]}</span>`:''}).join('')}
function ffScoreBadge(x){return `<span class="ffScore g${x.grade}" title="Flip confidence 0–100 · volume 40 / price stability 30 / spread quality 20 / data freshness 10">${x.grade} · ${x.score}</span>`}
function ffSetView(v){FINDER_VIEW=v;render()}
function ffSetPreset(p){FINDER_PRESET=p;FINDER_SORT_KEY='';FINDER_SHOW=100;render()}
function ffToggleF(k){FINDER_F[k]=!FINDER_F[k];FINDER_SHOW=100;render()}
function ffOnFilterInput(k,v){FINDER_F[k]=v;FINDER_SHOW=100;ffRefreshList()}
function ffOnSearch(v){FINDER_SEARCH=v||'';FINDER_SHOW=100;ffRefreshList()}
function ffSetSort(k){if(FINDER_SORT_KEY===k)FINDER_SORT_DIR=FINDER_SORT_DIR==='desc'?'asc':'desc';else{FINDER_SORT_KEY=k;FINDER_SORT_DIR=k==='name'?'asc':'desc'}render()}
function ffSortHead(label,key,title,cl){let mark=FINDER_SORT_KEY===key?(FINDER_SORT_DIR==='desc'?' ▼':' ▲'):'';return `<th class="sortable ${cl||'num'}" title="${esc(title||'')}" onclick="ffSetSort('${key}')">${esc(label)}${mark}</th>`}
function ffVal(x,k){if(k==='name')return String(x.name||'').toLowerCase();let v=x[k];return v===null||v===undefined?-Infinity:Number(v)}
function ffRows(){
 let all=(FINDER_DATA||{}).items||[],p=FINDER_PRESETS[FINDER_PRESET]||FINDER_PRESETS.recommended,f=FINDER_F;
 let q=FINDER_SEARCH.trim().toLowerCase(),budget=ffNum(f.budget),minMargin=ffNum(f.minMargin),minDayVol=ffNum(f.minDayVol);
 let rows=all.filter(x=>{
  if(f.hideBlocked&&x.blocked)return false;
  if(f.f2p&&x.members)return false;
  if(f.hideRisky&&((x.flags||[]).includes('manip_risk')||(x.flags||[]).includes('one_sided')))return false;
  if(budget!==null&&x.instant_sell>budget)return false;
  if(minMargin!==null&&x.margin_after_tax<minMargin)return false;
  if(minDayVol!==null&&x.daily_volume<minDayVol)return false;
  if(q&&!(String(x.name||'').toLowerCase().includes(q)||String(x.item_id).includes(q)))return false;
  try{return !!p.fn(x)}catch(e){return false}
 });
 let sk=FINDER_SORT_KEY||p.sort[0],sd=FINDER_SORT_KEY?FINDER_SORT_DIR:p.sort[1];
 rows.sort((a,b)=>{let av=ffVal(a,sk),bv=ffVal(b,sk),c=av>bv?1:av<bv?-1:0;return sd==='asc'?c:-c});
 return rows;
}
function ffZCell(x){

 let z=x.z_score,c=z<=-1.2?'green':z>=2?'red':z>=1?'gold':'muted';
 let lbl=z<=-1.2?'cheap':z>=2?'rich':z>=1?'high':'fair';
 return `<span class="${c}" title="Price is ${Math.abs(z).toFixed(1)} std ${z<0?'below':'above'} its 7-day average (${lbl}). 7d range ${fmt(x.low_7d)}–${fmt(x.high_7d)} · volatility ${x.volatility_pct??'—'}%">${z>0?'+':''}${z.toFixed(1)}σ</span>`;
}

 let fill=x.fill_hours===null||x.fill_hours===undefined?'—':x.fill_hours<0.084?'<5m':x.fill_hours<1?Math.round(x.fill_hours*60)+'m':x.fill_hours.toFixed(1)+'h';
 let age=ffAge(Math.max(x.buy_age_s??0,x.sell_age_s??0));
 let consist=x.margin_consistency!==null&&x.margin_consistency!==undefined?` · margin existed ${(x.margin_consistency*100).toFixed(0)}% of the last 7d hours`:'';
 return `<tr><td><div class="itemCell ffName" onclick="openItemPage({slug:'${esc(x.slug)}'})" title="Open item research page · last trade ${age} ago">${itemIcon(x.name,x)}<span>${esc(x.name)}</span>${ffFlags(x)}</div></td><td class="num" title="Suggested buy offer: 1 gp above the current instant-sell price">${fmt(x.buy_at)}</td><td class="num" title="Suggested sell offer: 1 gp below the current instant-buy price">${fmt(x.sell_at)}</td><td class="num ${cls(x.offer_margin)}" title="Profit per item at the suggested offers, after 2% GE tax${consist}">${fmt(x.offer_margin)}</td><td class="num">${roi}</td><td class="num">${ffScoreBadge(x)}</td><td class="num ${cls(x.ev_day)}" title="Expected GP/day from one GE slot: margin × realistic capture (~15% of the thin side, capped by buy limit × 6 windows) × margin consistency × fill reliability">${fmt(x.ev_day)}</td><td class="num">${ffZCell(x)}</td><td class="num ffSparkCell" id="ffspark-${x.item_id}"><span class="muted">·</span></td><td class="num" title="insta-buys ${fmt(x.vol_buy_1h)}/h · insta-sells ${fmt(x.vol_sell_1h)}/h · last trade ${age} ago">${fmt(x.vol_1h)}/h · ${fmt(x.daily_volume)}/d</td><td class="num">${x.buy_limit??'—'}</td><td class="num" title="Estimated time to fill the full buy limit at current trade rate · GP @ full limit: ${fmt(x.limit_profit)}">${fill}</td><td class="num" title="Your all-time profit · flips on this item">${mine}</td><td class="num ffActs">${ffStarBtn(x)}<button class="blAct allow" onclick="ffTrack(${x.item_id})" title="Track a buy of this item in your portfolio">＋</button></td></tr>`;
}

 let body=shown.map(ffRow).join('')||`<tr><td colspan="14" class="empty">No items match this preset and your filters</td></tr>`;
 let more=rows.length>FINDER_SHOW?`<button class="ffMore" onclick="FINDER_SHOW+=200;render()">Show 200 more (${fmt(rows.length-FINDER_SHOW)} hidden)</button>`:'';
 let hist=(FINDER_DATA||{}).stats?.with_history||0;
 let foot=`<div class="blFoot"><span>Showing ${shown.length} of ${fmt(rows.length)} matches · ${esc(FINDER_PRESETS[FINDER_PRESET]?.desc||'')}</span><span>${fmt(hist)} items with 7d history · ${esc((FINDER_DATA||{}).generated_at||'')}${FINDER_LOADING?' · refreshing…':''}</span></div>`;

 return `<div class="blTableWrap"><table>${head}<tbody>${body}</tbody></table></div>${more}${foot}`;

let FF_SPARKS={},FF_SPARKS_PENDING=false;
function ffSparkSvg(vals){
 if(!vals||vals.length<3)return '<span class="muted">·</span>';
 let min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
 let pts=vals.map((v,i)=>`${(i/(vals.length-1)*60).toFixed(1)},${(16-((v-min)/range*14)-1).toFixed(1)}`).join(' ');
 let up=vals[vals.length-1]>=vals[0];
 return `<svg class="ffSpark" viewBox="0 0 60 16" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${up?'var(--green,#00d9a6)':'var(--red,#ff4d5a)'}" stroke-width="1.3"/></svg>`;
}
async function ffLoadSparks(){
 if(FF_SPARKS_PENDING)return;
 let cells=[...document.querySelectorAll('.ffSparkCell')];if(!cells.length)return;
 let need=cells.map(c=>c.id.replace('ffspark-','')).filter(id=>FF_SPARKS[id]===undefined);
 if(need.length){
  FF_SPARKS_PENDING=true;
  try{let r=await fetchJson('/api/flip-finder/sparks?ids='+need.join(','));for(let id of need)FF_SPARKS[id]=(r.sparks||{})[id]||null}catch(e){}
  finally{FF_SPARKS_PENDING=false}
 }
 document.querySelectorAll('.ffSparkCell').forEach(c=>{let id=c.id.replace('ffspark-','');if(FF_SPARKS[id]!==undefined)c.innerHTML=ffSparkSvg(FF_SPARKS[id])});
}

function ffToast(msg,kind){
 let wrap=document.querySelector('.ffToasts');
 if(!wrap){wrap=document.createElement('div');wrap.className='ffToasts';document.body.appendChild(wrap)}
 let t=document.createElement('div');t.className='ffToast '+(kind||'');t.textContent=msg;wrap.appendChild(t);
 setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),400)},9000);
}
function ffHandleAlerts(alerts){
 let seen={};try{seen=JSON.parse(localStorage.getItem('ffAlertSeen')||'{}')}catch(e){}
 let now=Date.now(),fresh=[];
 for(let a of alerts||[]){
  let k=a.item_id+':'+a.kind;
  if(seen[k]&&now-seen[k]<60*60*1000)continue;
  seen[k]=now;fresh.push(a);
 }
 if(!fresh.length)return;
 try{localStorage.setItem('ffAlertSeen',JSON.stringify(seen))}catch(e){}
 for(let a of fresh.slice(0,4)){
  ffToast((a.kind==='dip'?'🎯 ':'💰 ')+a.detail,a.kind);
  if(window.Notification&&Notification.permission==='granted')try{new Notification(a.kind==='dip'?'Dip buy signal':'Margin signal',{body:a.detail})}catch(e){}
 }
}

let FIT_LAST={w:0,h:0},FIT_T=null;
function fitItemChart(){
 let box=$('chartFitBox');if(!box)return;
 let card=box.closest('.chartCard');if(!card)return;
 let foot=card.querySelector('.chartPerfFoot');
 let w=Math.max(320,Math.round(box.clientWidth));
 let br=box.getBoundingClientRect();
 let slack=foot?Math.round(foot.getBoundingClientRect().top-br.bottom-12):0;
 let svg=box.querySelector('svg.priceChart');
 let cur=svg?Math.round(svg.getBoundingClientRect().height):360;
 let h=Math.max(360,Math.min(900,cur+Math.max(0,slack)));
 if(Math.abs(w-FIT_LAST.w)<12&&Math.abs(h-FIT_LAST.h)<12)return;
 FIT_LAST={w,h};
 box.innerHTML=combinedChart((ITEM_PAGE_DETAIL||{}).chart||[],w,h);
}
window.addEventListener('resize',()=>{FIT_LAST={w:0,h:0};clearTimeout(FIT_T);FIT_T=setTimeout(fitItemChart,160)});

function updateHeaderStamp(){let api=DATA?.csv?.csv_mtime||DATA?.data_sources?.freshness?.csv_mtime;$('updated').textContent=api?`Updated ${dt(api)}`:'No data yet'}
async function load(){if(LOAD_BUSY)return;LOAD_BUSY=true;let url='/api/summary?period='+encodeURIComponent(RANGE)+'&ts='+Date.now();if(CUSTOM_START&&CUSTOM_END)url+='&start='+encodeURIComponent(CUSTOM_START)+'&end='+encodeURIComponent(CUSTOM_END);if(GP_SESSION_ANCHOR)url+='&session_start='+encodeURIComponent(GP_SESSION_ANCHOR);try{let next=await fetchJson(url);DATA=next;LOAD_ERROR='';updateHeaderStamp()}catch(e){LOAD_ERROR=e.message||String(e);$('updated').textContent=DATA?'stale · '+dt(DATA.generated_at):'load failed'}finally{LOAD_BUSY=false;render()}}
async function saveConfig(){let baselines={};ACTIVE.forEach((a,i)=>{let raw=String($('base'+i).value||'').replace(/[^0-9-]/g,'');baselines[a]=parseInt(raw||'0',10)||0});let payload={active_accounts:ACTIVE,baseline_at:$('baselineAt').value?new Date($('baselineAt').value).toISOString():new Date().toISOString(),account_baselines:baselines,notes:$('notes').value||'',monthly_goal:parseInt(String($('monthlyGoal')?.value||'').replace(/[^0-9]/g,'')||'0',10)||0,owed:parseInt(String($('owedAmount')?.value||'').replace(/[^0-9]/g,'')||'0',10)||0};try{let res=await fetchJson('/api/bankroll-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});$('saveMsg').textContent=res.error?res.error:'Saved';BANKROLL_DIRTY=false;await loadConfig();await load()}catch(e){$('saveMsg').textContent=e.message||String(e)}}
async function applyTransfer(){let msg=$('transferMsg'),payload={from:$('transferFrom').value,to:$('transferTo').value,amount:String($('transferAmount').value||'').replace(/[^0-9-]/g,'')};if(msg)msg.textContent='Applying…';try{await fetchJson('/api/bankroll-transfer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(msg)msg.textContent='Applied';await loadConfig();await load()}catch(e){if(msg)msg.textContent=e.message||String(e)}}
async function applyBondPurchase(){let msg=$('bondMsg'),payload={account:$('bondAccount').value,amount:String($('bondAmount').value||'').replace(/[^0-9-]/g,'')};if(msg)msg.textContent='Deducting…';try{await fetchJson('/api/bond-purchase',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(msg)msg.textContent='Deducted';await loadConfig();await load()}catch(e){if(msg)msg.textContent=e.message||String(e)}}
async function applyBalanceAdjust(kind){let msg=$('adjMsg'),payload={account:$('adjAccount').value,amount:String($('adjAmount').value||'').replace(/[^0-9-]/g,''),kind};if(msg)msg.textContent=kind==='deposit'?'Depositing…':'Withdrawing…';try{await fetchJson('/api/bankroll-adjust',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(msg)msg.textContent=kind==='deposit'?'Deposited':'Withdrawn';let i=$('adjAmount');if(i)i.value='';await loadConfig();await load()}catch(e){if(msg)msg.textContent=e.message||String(e)}}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');ITEM_DETAIL=null;if(location.pathname.startsWith('/item/')){history.pushState({},'','/');ITEM_PAGE_SLUG='';ITEM_PAGE_DETAIL=null}render()});
document.querySelectorAll('.ranges button[data-range]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.ranges button[data-range]').forEach(x=>x.classList.remove('active'));$('customToggleBtn').classList.remove('active');$('customRangePanel').classList.add('hidden');b.classList.add('active');RANGE=b.dataset.range;CUSTOM_START=CUSTOM_END=null;ITEM_DETAIL=null;RECENT_TX_PAGE=0;load()});
$('customToggleBtn').onclick=()=>{$('customRangePanel').classList.toggle('hidden')};
$('customBtn').onclick=()=>{CUSTOM_START=$('startInput').value;CUSTOM_END=$('endInput').value;if(CUSTOM_START&&CUSTOM_END){document.querySelectorAll('.ranges button[data-range]').forEach(x=>x.classList.remove('active'));$('customToggleBtn').classList.add('active');RANGE='custom';ITEM_DETAIL=null;RECENT_TX_PAGE=0;load()}};
$('liveSync').onclick=()=>refreshCopilotCsv(false);
$('settingsBtn').onclick=()=>{SHOW_BANKROLL_SETTINGS=!SHOW_BANKROLL_SETTINGS;render()};
$('globalItemSearch').oninput=handleGlobalSearchInput;
$('globalSearchResults').onclick=e=>{let row=e.target.closest('.searchResult');if(!row)return;let item=GLOBAL_SEARCH_RESULTS.find(x=>x.slug===row.dataset.slug);if(item)openItemPage(item)};
window.onpopstate=()=>render();
document.addEventListener('keydown',e=>{if(e.key==='Escape'){let changed=false;if(SHOW_BANKROLL_SETTINGS){SHOW_BANKROLL_SETTINGS=false;changed=true}if(ITEM_DETAIL){ITEM_DETAIL=null;changed=true}if(changed)render()}});
function updateLiveSync(){
  let el=$('liveSync');if(!el)return;
  el.title='Click to refresh now';
  let flash=el.classList.contains('justSynced')?' justSynced':'';
  if(EXPORT_BUSY){el.className='liveSync syncing';el.innerHTML='<span class="ldot"></span> syncing…';return;}
  if(!isActivelyTrading()){el.className='liveSync offline'+flash;el.innerHTML='<span class="ldot"></span> not trading · tap to refresh';return;}
  let due=Math.max(0,CSV_API_ACTIVE_FETCH_MS-(Date.now()-LAST_CSV_FETCH_AT));
  let secs=Math.ceil(due/1000),mm=Math.floor(secs/60),ss=secs%60,t=mm>0?`${mm}:${String(ss).padStart(2,'0')}`:`${secs}s`;
  el.className='liveSync live';el.innerHTML=`<span class="ldot"></span> live · next ${t}`;
}
function syncTick(){
  if(!EXPORT_BUSY&&(Date.now()-LAST_CSV_FETCH_AT)>=CSV_API_ACTIVE_FETCH_MS&&shouldAutoFetchCsv())refreshCopilotCsv(true);
  updateLiveSync();
}
(function(){let q=new URLSearchParams(location.search),t=q.get('tab');if(q.get('view')==='portfolio')FINDER_VIEW='portfolio';if(!t)return;let b=document.querySelector(`.nav button[data-tab="${t}"]`);if(b){document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}})();
(async()=>{await loadConfig();await load();LAST_CSV_FETCH_AT=Date.now();updateLiveSync();setInterval(()=>{if(shouldAutoRefresh())load();ffAutoTick()},60000);setInterval(syncTick,1000);setInterval(refreshOpenItemPage,ITEM_PAGE_REFRESH_MS)})();
function openItemFromDataset(row){if(row?.dataset?.item)openItemPage({name:row.dataset.item})}
document.addEventListener('click',e=>{let row=e.target.closest('.clickable-row');if(row?.dataset?.item){document.querySelectorAll('.clickable-row').forEach(r=>r.classList.remove('selected'));row.classList.add('selected');openItemFromDataset(row)}});

/* ── Interactive KPI sparklines: hover guide line + dot + tooltip ── */
const sparkTipFmt={profit:v=>(v>0?'+':'')+fmt(v),rate:v=>(v>0?'+':'')+fmt(v)+'/h'};
let _sparkOverlay=null;
function sparkOverlay(){if(_sparkOverlay)return _sparkOverlay;let g=document.createElement('div');g.className='sparkGuide';let d=document.createElement('div');d.className='sparkDot';let t=document.createElement('div');t.className='sparkTip';document.body.append(g,d,t);return _sparkOverlay={g,d,t}}
function hideSpark(){if(_sparkOverlay){_sparkOverlay.g.style.opacity=0;_sparkOverlay.d.style.opacity=0;_sparkOverlay.t.style.opacity=0}}
document.addEventListener('mousemove',e=>{
  let svg=e.target.closest&&e.target.closest('.kpi-spark');
  if(!svg||!svg.dataset.spark){hideSpark();return}
  let data;try{data=JSON.parse(svg.dataset.spark)}catch(_){hideSpark();return}
  let vals=data.v,times=data.t,ys=data.y,n=vals.length;
  if(!n||n<2){hideSpark();return}
  let rect=svg.getBoundingClientRect();
  let ratio=Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width));
  let idx=Math.round(ratio*(n-1));
  let px=rect.left+(idx/(n-1))*rect.width;
  let py=rect.top+(ys[idx]/100)*rect.height;
  let col=getComputedStyle(svg.querySelector('path[stroke]')).stroke||'#00d9a6';
  let{g,d,t}=sparkOverlay();
  g.style.left=px+'px';g.style.top=rect.top+'px';g.style.height=rect.height+'px';g.style.background=col;g.style.opacity=.35;
  d.style.left=px+'px';d.style.top=py+'px';d.style.background=col;d.style.opacity=1;
  let when=(times&&times[idx])?dt(times[idx])+' · ':'';
  t.textContent=when+(sparkTipFmt[data.k]||fmt)(vals[idx]);
  t.style.opacity=1;
  let tw=t.offsetWidth||60;
  t.style.left=Math.min(window.innerWidth-tw-8,Math.max(8,px-tw/2))+'px';
  t.style.top=Math.max(8,rect.top-30)+'px';
},{passive:true});
document.addEventListener('mouseleave',hideSpark);
window.addEventListener('scroll',hideSpark,{passive:true});

/* ── Interactive hover for item-page charts (price + volume) ── */
let _chartTip=null;
function chartTipEls(){if(_chartTip)return _chartTip;let g=document.createElement('div');g.className='chartGuide';let d=document.createElement('div');d.className='chartDot';let t=document.createElement('div');t.className='chartTip';document.body.append(g,d,t);return _chartTip={g,d,t}}
function hideChartTip(){if(_chartTip){_chartTip.g.style.opacity=0;_chartTip.d.style.opacity=0;_chartTip.t.style.opacity=0}}
document.addEventListener('mousemove',e=>{
  let svg=e.target.closest&&e.target.closest('.hoverChart');
  if(!svg||!svg.dataset.points){hideChartTip();return}
  let pts;try{pts=JSON.parse(svg.dataset.points)}catch(_){hideChartTip();return}
  if(!pts.length){hideChartTip();return}
  let vb=svg.viewBox.baseVal,rect=svg.getBoundingClientRect();
  if(!vb||!vb.width||!rect.width){hideChartTip();return}
  let sx=rect.width/vb.width,sy=rect.height/vb.height;
  let mxVb=(e.clientX-rect.left)/sx;
  let best=0,bd=Infinity;for(let i=0;i<pts.length;i++){let dd=Math.abs(pts[i].x-mxVb);if(dd<bd){bd=dd;best=i}}
  let p=pts[best],px=rect.left+p.x*sx,py=rect.top+p.y*sy,col=svg.dataset.color||'#f5a623';
  let{g,d,t}=chartTipEls();
  g.style.left=px+'px';g.style.top=rect.top+'px';g.style.height=rect.height+'px';g.style.background=col;g.style.opacity=.4;
  d.style.left=px+'px';d.style.top=py+'px';d.style.background=col;d.style.opacity=1;
  t.innerHTML=p.l;t.style.opacity=1;
  let tw=t.offsetWidth||90,th=t.offsetHeight||34;
  t.style.left=Math.min(window.innerWidth-tw-8,Math.max(8,px-tw/2))+'px';
  t.style.top=Math.max(8,py-th-12)+'px';
},{passive:true});
document.addEventListener('mouseleave',hideChartTip);
window.addEventListener('scroll',hideChartTip,{passive:true});
</script>
