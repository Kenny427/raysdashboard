async function fetchStats(){if(STATS_LOADING)return;STATS_LOADING=true;render();try{
  let q='/api/stats?ts='+Date.now();
  if(STATS_RANGE==='day'&&STATS_DAY){q+='&range=custom&start='+encodeURIComponent(STATS_DAY+'T00:00')+'&end='+encodeURIComponent(addDaysStr(STATS_DAY,1)+'T00:00')}
  else{q+='&range='+encodeURIComponent(STATS_RANGE)}
  STATS_DATA=await fetchJson(q)
}catch(e){STATS_DATA={error:e.message}}finally{STATS_LOADING=false;render()}}
function setStatsDays(d){STATS_DAYS=d;STATS_DATA=null;fetchStats()}
function setStatsRange(r){STATS_RANGE=r;STATS_DATA=null;fetchStats()}
function setStatsDay(s){if(!s)return;let t=ymd(new Date());if(s>t)s=t;STATS_DAY=s;STATS_RANGE='day';STATS_DATA=null;fetchStats()}
function stepStatsDay(n){setStatsDay(addDaysStr(STATS_DAY||ymd(new Date()),n))}
function setStatsTfmp(tf){STATS_TFMP_SELECTED=tf;render()}
function setStatsSection(x){STATS_SECTION=x;render()}
function statSetSort(t,k){let s=STAT_SORT[t];if(s.k===k){s.d=s.d==='asc'?'desc':'asc'}else{s.k=k;s.d='desc'}render()}
function statSortRows(rows,s){if(!s||!s.k)return rows;let a=rows.slice();a.sort((x,y)=>{let va=x[s.k],vb=y[s.k];if(typeof va==='number'&&typeof vb==='number')return s.d==='asc'?va-vb:vb-va;va=String(va).toLowerCase();vb=String(vb).toLowerCase();return s.d==='asc'?va.localeCompare(vb):vb.localeCompare(va)});return a}
function statTh(t,label,key,numeric){let s=STAT_SORT[t],ar=s.k===key?(s.d==='asc'?' ↑':' ↓'):'';return `<th class="sortable${numeric?' num':''}" onclick="statSetSort('${t}','${key}')">${esc(label)}${ar}</th>`}
function settingStatTable(t,rows,firstLabel,firstRender,firstKey,emptyMsg,currentVals){
  rows=rows||[];
  let cur=new Set((currentVals||[]).map(String));
  let head=`<tr>${statTh(t,firstLabel,firstKey,false)}${statTh(t,'Flips','flips',true)}${statTh(t,'Profit','profit',true)}${statTh(t,'Avg','avg_profit',true)}${statTh(t,'Win%','win_rate',true)}${statTh(t,'gp/slot-hr','gp_per_slot_hour',true)}</tr>`;
  if(!rows.length)return `<table><thead>${head}</thead><tbody><tr><td colspan="6" class="statEmpty">${esc(emptyMsg||'No data')}</td></tr></tbody></table>`;
  let body=statSortRows(rows,STAT_SORT[t]).map(r=>{let isCur=cur.has(String(r[firstKey]));return `<tr><td><b>${firstRender(r)}</b>${isCur?' <span class="setNow">● now</span>':''}</td><td class="num">${r.flips}</td><td class="num ${cls(r.profit)}">${fmt(r.profit)}</td><td class="num">${fmt(r.avg_profit)}</td><td class="num">${r.win_rate}%</td><td class="num ${cls(r.gp_per_slot_hour)}">${fmt(r.gp_per_slot_hour)}/h</td></tr>`}).join('');
  return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
}
function statBarChart(items,labelFn){
  let act=(items||[]).filter(x=>x.flips);
  if(!act.length)return '<div class="statEmpty"><span class="ee">📊</span>No flips in this range yet</div>';
  let maxAbs=Math.max(1,...items.map(x=>Math.abs(num(x.profit))));
  let best=Math.max(...act.map(x=>num(x.profit)));
  return `<div class="sBars">${items.map(x=>{let v=num(x.profit),hp=x.flips?Math.max(3,Math.abs(v)/maxAbs*100):0;let isBest=x.flips&&v===best&&v>0;
    return `<div class="sBarCol${x.flips?'':' noflip'}" title="${esc(labelFn(x))} · ${fmt(v)} · ${x.flips} flips · ${x.win_rate}% win"><div class="sBarTrack"><div class="sBar ${v<0?'neg':'pos'}${isBest?' best':''}" style="height:${hp}%"></div></div><div class="sBarLbl">${esc(labelFn(x))}</div></div>`}).join('')}</div>`;
}
function stItemTable(arr,clickable){
  let rows=(arr||[]).map(x=>`<tr ${clickable?`class="clickable-row" onclick="openItemPage({slug:'${esc(x.slug||x.item)}'})"`:''}><td>${clickable?`<div class="itemCell"><span>${esc(x.item||'?')}</span></div>`:`<b>${esc(x.account||'?')}</b>`}</td><td class="num">${fmt(x.flips)}</td><td class="num ${cls(x.profit)}">${fmt(x.profit)}</td><td class="num">${fmt(x.avg)}</td><td class="num">${x.win_rate}%</td></tr>`).join('')||`<tr><td colspan="5" class="statEmpty">No data in this range</td></tr>`;
  return `<div class="card recentTx"><table><thead><tr><th>${clickable?'Item':'Account'}</th><th class="num">Flips</th><th class="num">Profit</th><th class="num">Avg</th><th class="num">Win%</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function stEffTable(arr){
  let rows=(arr||[]).map(x=>`<tr class="clickable-row" onclick="openItemPage({slug:'${esc(x.slug||x.item)}'})"><td><div class="itemCell"><span>${esc(x.item)}</span></div></td><td class="num">${x.flips}</td><td class="num ${cls(x.profit)}">${fmt(x.profit)}</td><td class="num ${cls(x.gp_slot_hr)}">${fmt(x.gp_slot_hr)}/h</td></tr>`).join('')||`<tr><td colspan="4" class="statEmpty">Builds up after 5+ flips per item</td></tr>`;
  return `<div class="card recentTx"><table><thead><tr><th>Item</th><th class="num">Flips</th><th class="num">Profit</th><th class="num">gp/slot-hr</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function statFactsCard(title,facts){
  return `<div class="card statFacts"><div class="statFactsTitle">${esc(title)}</div><div class="statFactsGrid">${facts.map(f=>`<div class="statFact"><div class="sfLbl">${esc(f[0])}</div><div class="sfVal">${f[1]}</div>${f[2]?`<div class="sfSub">${esc(f[2])}</div>`:''}</div>`).join('')}</div></div>`;
}
function statSec(title,hint){return `<div class="statSec"><h3>${title}</h3>${hint?`<span class="secHint">${esc(hint)}</span>`:''}</div>`}
function renderStatsPage(){
  let s=STATS_DATA;
  if(!s&&STATS_LOADING)return `<div class="statsPage"><div class="card"><b class="muted">Loading stats…</b></div></div>`;
  s=s||{};
  if(s.error)return `<div class="statsPage"><div class="card errorBox"><b class="red">${esc(s.error)}</b></div></div>`;
  let t=s.totals||{}, dayName=d=>['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][d]??d, pad=h=>String(h).padStart(2,'0');
  let tfl=m=>m>=60?((m%60?(m/60).toFixed(1):m/60)+'h'):m+'m';
  let _today=ymd(new Date()),_yest=addDaysStr(_today,-1),_day=STATS_DAY||_today,_isDay=STATS_RANGE==='day';
  // ---- filter bar ----
  let seg=(on,label,handler)=>`<button class="${on?'on':''}" onclick="${handler}">${label}</button>`;
  let rangeSeg=`<div class="statSeg">${seg(_isDay&&_day===_today,'Today',`setStatsDay('${_today}')`)}${seg(_isDay&&_day===_yest,'Yesterday',`setStatsDay('${_yest}')`)}${seg(STATS_RANGE==='this_week','This week',"setStatsRange('this_week')")}${seg(STATS_RANGE==='this_month','This month',"setStatsRange('this_month')")}${seg(STATS_RANGE==='all_time','All time',"setStatsRange('all_time')")}</div>`;
  let isSpecificDay=_isDay&&_day!==_today&&_day!==_yest;
  let dayBox=`<div class="statDayBox${isSpecificDay?' on':''}" title="Jump to a specific day"><button onclick="stepStatsDay(-1)" title="Previous day">‹</button><input type="date" class="statDayInput" value="${esc(_day)}" max="${_today}" onchange="setStatsDay(this.value)"><button onclick="stepStatsDay(1)" ${(_isDay&&_day>=_today)?'disabled':''} title="Next day">›</button></div>`;
  let controls=`<div class="statsControls">${rangeSeg}${dayBox}<button class="save statRefresh" onclick="fetchStats()" ${STATS_LOADING?'disabled':''} title="Re-fetch stats">${STATS_LOADING?'…':'⟳'}</button></div>`;
  let rangeLabel=STATS_RANGE==='day'?statsDayLabel(_day):(({this_week:'This week',this_month:'This month',all_time:'All time'})[STATS_RANGE]||'All time');
  // ---- sub-tabs ----
  let tab=(id,label)=>`<button class="${STATS_SECTION===id?'on':''}" onclick="setStatsSection('${id}')">${label}</button>`;
  let tabs=`<div class="statTabs">${tab('overview','Overview')}${tab('items','Items')}${tab('settings','Settings lab')}${tab('slots','Slots')}</div>`;
  let hints={overview:'How you did over the selected range — profit, timing and consistency.',items:'Which items make or lose you money, over the selected range.',settings:"Which Copilot settings earn the most per slot-hour, within the selected range (never counted before each experiment's reset point).",slots:'Real GE-slot occupancy, logged live while the dashboard is open.'};
  let hint=`<div class="statTabHint"><span class="hi">▸</span>${esc(hints[STATS_SECTION]||hints.overview)}</div>`;

  // ===== OVERVIEW =====
  let bh=t.best_hour,bd=t.best_dow,bday=t.best_day,big=t.biggest;
  let headline=`<div class="statHeadline">${kpi('Total profit',t.profit||0,`${fmt(t.flips||0)} flips · ${t.win_rate||0}% win`)}${neutralKpi('Profit / day',t.avg_per_day||0,`${t.trading_days||0} trading days`)}${neutralKpi('Avg / flip',t.avg||0,'per finished flip')}${miniKpi('Win rate',(t.win_rate||0)+'%','of all flips')}${miniKpi('Flips / day',fmt(t.flips_per_day||0),'avg in range')}</div>`;
  let facts=statFactsCard('Highlights',[
    ['Best hour', bh?pad(bh.hour)+':00':'—', bh?fmt(bh.profit):''],
    ['Best weekday', bd?dayName(bd.dow):'—', bd?fmt(bd.profit):''],
    ['Best day', bday?dt(bday.date).split(',')[0].trim():'—', bday?fmt(bday.profit):''],
    ['Biggest flip', big?fmt(big.profit):'—', big?big.item:''],
    ['Avg hold', t.avg_hold_h!=null?t.avg_hold_h+'h':'—','buy → sell'],
    ['GE tax paid', fmt(t.tax_paid||0), t.tax_pct!=null?t.tax_pct+'% of gross':''],
    ['Turnover', fmt(t.turnover||0),'gp bought'],
    ['Top-5 items', t.top5_share!=null?t.top5_share+'%':'—','of total profit'],
    ['Trading days', String(t.trading_days||0),'with flips'],
    ['Total flips', fmt(t.flips||0), rangeLabel],
  ]);
  let cum=s.cumulative||[];
  let cumChart=cum.length>1?bankrollChart(cum.map(c=>c.cum),cum.map(c=>c.date)):'<div class="statEmpty"><span class="ee">📈</span>Not enough days in this range to chart yet</div>';
  let overview=`${headline}${facts}
    ${statSec('Profit over time','cumulative gp in range')}
    <div class="card chartCard">${cumChart}</div>
    ${statSec('When you profit','hover a bar for detail · brightest = best')}
    <div class="statCols2"><div><div class="statSubLbl">By hour of day</div><div class="card statChartCard">${statBarChart(s.by_hour||[],x=>pad(x.hour))}</div></div><div><div class="statSubLbl">By day of week</div><div class="card statChartCard">${statBarChart(s.by_dow||[],x=>dayName(x.dow))}</div></div></div>`;

  // ===== ITEMS =====
  let tierRows=(s.by_tier||[]).map(r=>`<tr><td><b>${esc(r.label)}</b></td><td class="num">${fmt(r.flips)}</td><td class="num ${cls(r.profit)}">${fmt(r.profit)}</td><td class="num">${fmt(r.avg)}</td><td class="num">${r.win_rate}%</td></tr>`).join('')||`<tr><td colspan="5" class="statEmpty">No data in this range</td></tr>`;
  let items=`
    ${statSec('Slot efficiency','gp earned per hour a slot is tied up — your tight-list metric')}
    <div class="statCols2"><div><div class="statSubLbl green">Most efficient</div>${stEffTable(s.fast_items)}</div><div><div class="statSubLbl red">Least efficient</div>${stEffTable(s.slow_items)}</div></div>
    ${statSec('Profit leaders','total gp by item')}
    <div class="statCols2"><div><div class="statSubLbl green">Top earners</div>${stItemTable(s.top_items,true)}</div><div><div class="statSubLbl red">Biggest losers</div>${stItemTable(s.worst_items,true)}</div></div>
    ${statSec('Activity & consistency')}
    <div class="statCols2"><div><div class="statSubLbl">Most flipped</div>${stItemTable(s.most_flipped,true)}</div><div><div class="statSubLbl">Best win rate · 10+ flips</div>${stItemTable(s.best_win,true)}</div></div>
    ${statSec('By price tier','where your capital works')}
    <div class="card recentTx"><table><thead><tr><th>Buy price</th><th class="num">Flips</th><th class="num">Profit</th><th class="num">Avg</th><th class="num">Win%</th></tr></thead><tbody>${tierRows}</tbody></table></div>`;

  // ===== SETTINGS LAB =====
  let tfCur=[...new Set(Object.values(s.timeframe_current||{}).filter(Boolean))];
  let mpCur=[...new Set(Object.values(s.minprofit_current||{}).filter(v=>v!==null&&v!==undefined&&v!==''))];
  let mpSince=s.minprofit_since?dt(s.minprofit_since).split(',')[0].trim():'now';
  let tfSince=s.timeframe_since?dt(s.timeframe_since).split(',')[0].trim():'today';
  let tfmpAll=s.by_timeframe_minprofit||[];
  let tfmpTimes=[...new Set(tfmpAll.map(r=>Number(r.timeframe_min)).filter(Boolean))].sort((a,b)=>a-b);
  if(STATS_TFMP_SELECTED!==''&&STATS_TFMP_SELECTED!=='all'&&!tfmpTimes.includes(Number(STATS_TFMP_SELECTED)))STATS_TFMP_SELECTED='';
  if(STATS_TFMP_SELECTED===''&&tfmpTimes.length)STATS_TFMP_SELECTED=tfmpTimes[0];
  let tfmpFiltered=STATS_TFMP_SELECTED==='all'?tfmpAll:tfmpAll.filter(r=>Number(r.timeframe_min)===Number(STATS_TFMP_SELECTED));
  let tfmpChips=`<button class="${STATS_TFMP_SELECTED==='all'?'on':''}" onclick="setStatsTfmp('all')">All</button>`+tfmpTimes.map(tf=>`<button class="${Number(STATS_TFMP_SELECTED)===tf?'on':''}" onclick="setStatsTfmp(${tf})">${tfl(tf)}</button>`).join('');
  let tfmpTitle=STATS_TFMP_SELECTED==='all'?'All time modifiers':`${tfl(Number(STATS_TFMP_SELECTED))} time modifier`;
  let tfmpSince=s.timeframe_minprofit_since?dt(s.timeframe_minprofit_since).split(',')[0].trim():(mpSince||tfSince);
  let mpNow=mpCur.length?`<span class="setNow">● now: ${esc(mpCur.map(mpLabel).join(', '))}</span>`:'';
  let tfNow=tfCur.length?`<span class="setNow">● now: ${esc(tfCur.map(tfl).join(', '))}</span>`:'';
  let settings=`
    <div class="statExplain"><span class="si">🧪</span><div>These tables answer <b>"which Copilot setting earns more per slot-hour?"</b> They count only <b>clean flips</b> — where the setting didn't change between a flip's buy and sell — <b>within the date range</b> above (never earlier than each experiment's reset point). Set different values across your accounts to build a fair comparison.</div></div>
    ${statSec('By account','total profit per account · '+rangeLabel)}
    ${stItemTable(s.by_account,false)}
    ${statSec('Min predicted profit','since '+mpSince)}${mpNow}
    <div class="card recentTx" style="margin-top:8px">${settingStatTable('mp',s.by_minprofit,'Min pred. profit',r=>mpLabel(r.min_profit),'min_profit','No clean data yet — set different min-profit values per account (Accounts tab), then check back after a day.',mpCur)}<div class="blFoot"><span>Clean flips only · attributed by buy · click a column to sort.</span></div></div>
    ${statSec('Copilot timeframe','since '+tfSince)}${tfNow}
    <div class="card recentTx" style="margin-top:8px">${settingStatTable('tf',s.by_timeframe,'Timeframe',r=>tfl(r.timeframe_min),'timeframe_min','Builds up as you trade — set accounts to different timeframes to compare.',tfCur)}<div class="blFoot"><span>gp/slot-hr = profit per hour a slot is occupied · clean flips only · click a column to sort.</span></div></div>
    ${statSec('Timeframe × min profit','since '+tfmpSince)}
    <div class="card recentTx tfmpCard"><div class="tfmpHead"><div><b>${esc(tfmpTitle)}</b><div class="muted tiny">Compare min-profit settings inside one time modifier</div></div><div class="compactRanges tfmpChips">${tfmpChips}</div></div>${settingStatTable('tfmp',tfmpFiltered,'Min pred. profit',r=>mpLabel(r.min_profit),'min_profit','No clean combined data yet')}<div class="blFoot"><span>Counted only if both timeframe and min-profit stayed unchanged buy→sell.</span></div></div>`;

  // ===== SLOTS =====
  let so=s.slot_occupancy||{};
  let soKpis=`<div class="statHeadline">${kpi('True gp / slot-hr',so.true_gp_per_occ_hr||0,'profit ÷ real slot time')}${miniKpi('Slot utilization',so.utilization_pct!=null?so.utilization_pct+'%':'—','of capacity, while open')}${miniKpi('Avg buy fill',so.avg_buy_fill_h!=null?so.avg_buy_fill_h+'h':'—','place → first fill')}${miniKpi('Cancel rate',so.cancel_rate!=null?so.cancel_rate+'%':'—','buys freed unfilled')}${miniKpi('Slot uses',fmt(so.episodes||0),'logged')}</div>`;
  let soRows=statSortRows((so.items||[]),STAT_SORT.slots);
  let soHead=`<tr>${statTh('slots','Item','item',false)}${statTh('slots','Uses','episodes',true)}${statTh('slots','Slot-hrs','occupied_h',true)}${statTh('slots','Avg hrs','avg_h',true)}${statTh('slots','Fill%','fill_rate',true)}${statTh('slots','Re-lists','reprices',true)}${statTh('slots','Profit','profit',true)}${statTh('slots','gp/slot-hr','gp_per_occ_hr',true)}</tr>`;
  let soBody=soRows.map(r=>`<tr><td><b>${esc(r.item||'')}</b></td><td class="num">${r.episodes}</td><td class="num">${r.occupied_h}h</td><td class="num">${r.avg_h}h</td><td class="num">${r.fill_rate}%</td><td class="num">${r.reprices}</td><td class="num ${cls(r.profit)}">${fmt(r.profit)}</td><td class="num ${cls(r.gp_per_occ_hr)}">${fmt(r.gp_per_occ_hr)}/h</td></tr>`).join('')||'<tr><td colspan="8" class="statEmpty">No slot data yet — logging starts now; check back after a session of flipping.</td></tr>';
  let slots=`${soKpis}
    ${statSec('Biggest slot time-sinks','since '+(so.since?dt(so.since).split(',')[0].trim():'now'))}
    <div class="card recentTx"><div class="asTableWrap"><table><thead>${soHead}</thead><tbody>${soBody}</tbody></table></div><div class="blFoot"><span>Real GE-slot occupancy from the live slot files (buy-wait + holding + selling + cancels). "True gp/slot-hr" = profit ÷ actual slot time, so slow or cancelled buys drag it down. Click a column to sort.</span></div></div>`;

  let body=STATS_SECTION==='items'?items:STATS_SECTION==='slots'?slots:STATS_SECTION==='settings'?settings:overview;
  return `<div class="statsPage">
    <div class="statsHeadV2"><div class="stTitle">📊 Stats <span class="stRangeTag">${esc(rangeLabel)}</span></div>${controls}</div>
    ${tabs}${hint}${body}
  </div>`;
}
function accountCard(a,ctx){
  ctx=ctx||{};let total=num(ctx.total)||1,maxAbs=num(ctx.maxAbsProfit)||1;
  let share=num(a.current_bankroll)/total*100;
  let barW=Math.max(2,Math.min(100,Math.abs(num(a.profit_since_baseline))/maxAbs*100));
  let idle=!a.needs_setup&&num(a.baseline)>=50000000&&num(a.flips_since_baseline)<5;
  let badge=a.needs_setup?'<span class="pill warn">needs baseline</span>':(idle?'<span class="pill warn">idle capital</span>':'<span class="pill ok">tracking</span>');
  let adj=num(a.adjustments);
  let adjRow=adj?`<div class="row"><span>${adj>0?'Deposited':'Withdrawn'}</span><b class="${adj>0?'green':'red'}">${adj>0?'+':''}${fmt(adj)}</b></div>`:'';
  return `<div class="card acctCard"><div class="row"><b>${esc(a.account)}</b>${badge}</div><div class="row"><span>Current bankroll</span><b>${fmt(a.current_bankroll)} <span class="muted" style="font-weight:600">· ${share.toFixed(1)}%</span></b></div><div class="row"><span>Starting bankroll</span><span>${fmt(a.baseline)}</span></div>${adjRow}<div class="row"><span>Since baseline</span><b class="${cls(a.profit_since_baseline)}">${fmt(a.profit_since_baseline)}</b></div><div class="acctProfitBar"><div class="acctProfitFill ${cls(a.profit_since_baseline)}" style="width:${barW}%"></div></div><div class="row"><span>Today / week</span><span><b class="${cls(a.today_profit)}">${fmt(a.today_profit)}</b> / <b class="${cls(a.week_profit)}">${fmt(a.week_profit)}</b></span></div><div class="row"><span>ROI / flips</span><span><b class="${cls(a.profit_since_baseline)}">${pct(a.roi_since_baseline)}</b> · ${a.flips_since_baseline||0}</span></div></div>`;
}
function accountOptions(selected=''){return ACTIVE.map(a=>`<option value="${esc(a)}" ${a===selected?'selected':''}>${esc(a)}</option>`).join('')}
function renderDepositTool(){return `<div class="section">Deposit / withdraw</div><div class="card setup"><div class="field"><label>Account</label><select id="adjAccount" class="search">${accountOptions(ACTIVE[0])}</select></div><div class="field"><label>Amount GP</label><input id="adjAmount" inputmode="numeric" placeholder="500000000"></div><div style="grid-column:1/-1;display:flex;align-items:center;gap:8px"><button class="save" onclick="applyBalanceAdjust('deposit')">Deposit</button><button class="adjWithdraw" onclick="applyBalanceAdjust('withdraw')">Withdraw</button><span class="muted" id="adjMsg" style="margin-left:6px"></span></div><div class="muted" style="grid-column:1/-1">Add or remove capital from an account's balance. Kept separate from your baseline and your profit, so it never counts as P/L — use it whenever you move GP in or out of an account.</div></div>`}
function renderTransferTool(){return `<div class="section">Transfer between accounts</div><div class="card setup"><div class="field"><label>From</label><select id="transferFrom" class="search">${accountOptions(ACTIVE[0])}</select></div><div class="field"><label>To</label><select id="transferTo" class="search">${accountOptions(ACTIVE[1]||ACTIVE[0])}</select></div><div class="field"><label>Amount GP</label><input id="transferAmount" inputmode="numeric" placeholder="250000000"></div><div><button class="save" onclick="applyTransfer()">Apply transfer</button><span class="muted" id="transferMsg" style="margin-left:10px"></span></div><div class="muted" style="grid-column:1/-1">Moves capital from one account's balance to another (net-zero to your total). Accounting only — it does not perform the in-game trade.</div></div>`}
function renderBondTool(){return `<div class="section">Bond / membership cost</div><div class="card setup"><div class="field"><label>Account that bought bond</label><select id="bondAccount" class="search">${accountOptions(ACTIVE[0])}</select></div><div class="field"><label>Bond cost GP</label><input id="bondAmount" inputmode="numeric" placeholder="12500000"></div><div><button class="save" onclick="applyBondPurchase()">Deduct bond GP</button><span class="muted" id="bondMsg" style="margin-left:10px"></span></div><div class="muted" style="grid-column:1/-1">Records a bond/membership purchase as a withdrawal from that account's balance.</div></div>`}
function settingsSeg(){
  let tabs=[['goals','Goals & baselines'],['transfers','Balances'],['about','About']];
  return `<div class="blSeg settingsSeg">${tabs.map(([k,l])=>`<button class="${SETTINGS_TAB===k?'active allow':''}" onclick="SETTINGS_TAB='${k}';render()">${esc(l)}</button>`).join('')}</div>`;
}
function renderSettingsAbout(){
  let prof=BLOCKLIST_DATA?.profile_name||'—';
  let csv=DATA?.csv||{},goal=(CONFIG?.monthly_goal)||1000000000;

const ALLOC_PALETTE=['#00d9a6','#58a6ff','#a78bfa','#f5a623','#ff646f','#43d17a','#e879f9','#2dd4bf'];
function neutralKpi(label,value,note){return `<div class="card kpi"><div class="l">${kpiIcon(label)}${esc(label)}</div><div class="v plain">${fmt(value)}</div>${note?`<div class="n">${esc(note)}</div>`:''}</div>`}
function bankrollChart(vals,times,spanLabel){
  if(!vals||vals.length<2)return '<div class="empty">No bankroll history yet</div>';
  let min=Math.min(...vals),max=Math.max(...vals),pad=Math.max(1,(max-min)*0.08),lo=min-pad,hi=max+pad;
  let w=920,h=240,leftPad=92,bottomPad=34,plotW=w-leftPad-12,span=hi-lo||1;
  let xy=(v,i)=>[Math.round(leftPad+i/(vals.length-1)*plotW),Math.round(h-bottomPad-(v-lo)/span*(h-bottomPad-12))];
  let coords=vals.map((v,i)=>xy(v,i).join(',')).join(' ');
  let area=`${leftPad},${h-bottomPad} ${coords} ${leftPad+plotW},${h-bottomPad}`;
  let ticks=[max,(max+min)/2,min].map(v=>{let y=xy(v,0)[1];return `<g><line x1="${leftPad}" x2="${w-12}" y1="${y}" y2="${y}" stroke="rgba(130,146,166,.16)"/><text x="${leftPad-8}" y="${Math.max(12,y-6)}" fill="var(--muted)" font-size="13" font-weight="700" text-anchor="end">${fmtAxisGp(v)}</text></g>`}).join('');
  let labelT=(idx,anchor)=>{let x=xy(vals[idx],idx)[0];return `<text x="${x}" y="${h-8}" fill="var(--muted)" font-size="12" text-anchor="${anchor}">${esc(times[idx]?dt(times[idx]):'')}</text>`};
  let mid=Math.floor((vals.length-1)/2),xlabels=`${labelT(0,'start')}${labelT(mid,'middle')}${labelT(vals.length-1,'end')}`;
  let hoverPts=vals.map((v,i)=>{let[x,y]=xy(v,i);return {x,y,l:`<b>${fmtGp(v)}</b><div class="muted">${esc(times[i]?dt(times[i]):'')}</div>`}});
  let up=vals[vals.length-1]>=vals[0],col=up?'#00d9a6':'#ff646f';
  return `<div class="chartTitle"><b>Total bankroll</b><span class="compactNote">across active accounts · ${esc(spanLabel||'since baseline')}</span></div><svg class="bankrollChart hoverChart" viewBox="0 0 ${w} ${h}" style="width:100%;height:250px" data-color="${col}" data-points="${esc(JSON.stringify(hoverPts))}">${ticks}<g>${xlabels}</g><polygon points="${area}" fill="${up?'rgba(0,217,166,.08)':'rgba(255,100,111,.08)'}"/><polyline points="${coords}" fill="none" stroke="${col}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function renderBankrollGrowth(trend){

function rankGlyph(rank,px){let name=Array.isArray(rank)?rank[1]:rank,emoji=Array.isArray(rank)?rank[2]:'';let svg=RANK_SVG[name];if(!svg)return `<span style="font-size:${px}px;line-height:1">${emoji}</span>`;return `<svg viewBox="0 0 24 24" width="${px}" height="${px}" style="vertical-align:-0.18em;flex:0 0 auto" aria-hidden="true">${svg}</svg>`}
function goalDateStr(s){let d=new Date(s);if(isNaN(d))return '—';return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function goalDur(days){ // compact human duration from a day count
  days=Math.max(0,days);if(days<1)return Math.max(1,Math.round(days*24))+'h';
  let d=Math.round(days);if(d<14)return Math.max(1,d)+'d';
  if(d<60){let w=Math.floor(d/7);return w+'w '+(d-w*7)+'d'}
  let mo=Math.floor(d/30.44),rd=Math.round(d-mo*30.44);
  if(mo<12)return mo+'mo'+(rd>0?' '+rd+'d':'');
  let y=Math.floor(mo/12);return y+'y '+(mo-y*12)+'mo';}
function goalRelDays(s){let d=new Date(s);if(isNaN(d))return '';let days=(d-Date.now())/86400000;if(days<=0)return goalDur(-days)+' ago';return 'in '+goalDur(days)}
function goalEtaText(e){if(!e)return null;if(e.days<=0)return null;return {date:goalDateStr(e.date),rel:goalRelDays(e.date),days:Math.ceil(e.days)}}
function goalCard(){

function _gpShort(v){v=num(v);let a=Math.abs(v);if(a>=1e9){let s=v/1e9;return (s%1===0?s.toFixed(0):s.toFixed(1))+'B'}if(a>=1e6)return Math.round(v/1e6)+'M';if(a>=1e3)return Math.round(v/1e3)+'k';return String(Math.round(v))}
function _goalChip(label,val,note){return `<div class="goalChip"><div class="cl">${esc(label)}</div><div class="cv">${esc(String(val))}</div><div class="cn">${esc(note||'')}</div></div>`}
function goalScenarios(g){
  let rows=[['d7','Last 7-day','#00e6a8'],['d30','Last 30-day','#58a6ff'],['lifetime','Lifetime avg','#a78bfa']];
  let body=rows.map(([k,lbl,col])=>{
    let pace=num(g.paces?.[k]),e=goalEtaText(g.etas?.[k]),cho=k===g.chosen_key;
    let eta=g.reached?'reached':(pace<=0?'—':(e?`${esc(e.date)} · ${esc(e.rel)}`:'—'));
    return `<tr class="${cho?'cho':''}"><td><span class="dot" style="background:${col}"></span>${esc(lbl)}${cho?' ◂':''}</td><td class="num">${pace>0?fmt(pace)+'/d':'—'}</td><td class="num">${eta}</td></tr>`;
  }).join('');
  return `<table class="goalScen"><thead><tr><th>Pace window</th><th class="num">GP / day</th><th class="num">Projected finish</th></tr></thead><tbody>${body}</tbody></table>`;
}
function goalProjChart(g){
  let hist=(g.projection?.hist)||[],proj=(g.projection?.proj)||[];
  if(hist.length<2)return '<div class="empty">Not enough flip history yet — the projection appears once you have a profit trail.</div>';
  let tgt=num(g.target);
  let all=hist.concat(proj);
  let vals=all.map(p=>num(p.v)),times=all.map(p=>p.t);
  let maxV=Math.max(tgt,...vals),minV=Math.min(0,...vals);
  let w=920,h=210,leftPad=64,botPad=24,plotW=w-leftPad-14,plotH=h-botPad-10,span=(maxV-minV)||1;
  let t0=new Date(times[0]).getTime(),t1=new Date(times[times.length-1]).getTime(),tspan=(t1-t0)||1;
  let X=t=>leftPad+(new Date(t).getTime()-t0)/tspan*plotW;
  let Y=v=>h-botPad-(v-minV)/span*plotH;
  let pl=arr=>arr.map(p=>`${Math.round(X(p.t))},${Math.round(Y(num(p.v)))}`).join(' ');
  let histPts=pl(hist),projPts=proj.length?pl([hist[hist.length-1]].concat(proj)):'';
  // goal line
  let gy=Math.round(Y(tgt));
  let goalLine=`<line x1="${leftPad}" x2="${w-14}" y1="${gy}" y2="${gy}" stroke="rgba(245,166,35,.55)" stroke-width="1.5" stroke-dasharray="6 5"/><text x="${w-16}" y="${gy-6}" fill="#ffce6b" font-size="11" font-weight="800" text-anchor="end">${esc(_gpShort(tgt))} goal</text>`;
  // y ticks
  let ticks=[maxV,(maxV+minV)/2,minV].map(v=>{let y=Math.round(Y(v));return `<line x1="${leftPad}" x2="${w-14}" y1="${y}" y2="${y}" stroke="rgba(130,146,166,.12)"/><text x="${leftPad-8}" y="${y+4}" fill="var(--muted)" font-size="11" text-anchor="end">${esc(fmtAxisGp(v))}</text>`}).join('');
  // milestone dots on the curve
  let dots=(g.milestones||[]).filter(m=>m.reached&&m.reached_at).map(m=>{let x=X(m.reached_at),y=Y(num(m.value));if(x<leftPad||x>w-14)return '';return `<circle cx="${Math.round(x)}" cy="${Math.round(y)}" r="3.5" fill="#00e6a8" stroke="var(--card)" stroke-width="1.5"/>`}).join('');
  // hover points (whole series)
  let now=Date.now();
  let hoverPts=all.map(p=>{let fut=new Date(p.t).getTime()>now+60000;return {x:Math.round(X(p.t)),y:Math.round(Y(num(p.v))),l:`<b>${fmtGp(num(p.v))}</b><div class="muted">${esc(goalDateStr(p.t))}${fut?' · projected':''}</div>`}});
  let nowX=Math.round(X(new Date().toISOString()));
  let nowMark=(nowX>leftPad&&nowX<w-14)?`<line x1="${nowX}" x2="${nowX}" y1="10" y2="${h-botPad}" stroke="rgba(255,255,255,.18)" stroke-width="1" stroke-dasharray="3 4"/><text x="${nowX}" y="${h-10}" fill="var(--muted)" font-size="10" text-anchor="middle">now</text>`:'';
  let area=`${histPts} ${Math.round(X(hist[hist.length-1].t))},${Math.round(Y(minV))} ${leftPad},${Math.round(Y(minV))}`;
  return `<svg class="hoverChart" viewBox="0 0 ${w} ${h}" style="width:100%;height:215px" data-color="#00e6a8" data-points="${esc(JSON.stringify(hoverPts))}">
    ${ticks}${goalLine}
    <polygon points="${area}" fill="rgba(0,217,166,.07)"/>
    <polyline points="${histPts}" fill="none" stroke="#00e6a8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${projPts?`<polyline points="${projPts}" fill="none" stroke="#f5a623" stroke-width="2.5" stroke-dasharray="7 5" stroke-linecap="round"/>`:''}
    ${dots}${nowMark}
    <circle cx="${Math.round(X(hist[hist.length-1].t))}" cy="${Math.round(Y(num(hist[hist.length-1].v)))}" r="4" fill="#00e6a8" stroke="var(--card)" stroke-width="2"/>
  </svg>`;
}
function goalDailyBars(daily){
  if(!daily.length)return '<div class="empty">No recent daily data.</div>';
  let max=Math.max(1,...daily.map(d=>Math.abs(num(d.profit))));
  let bars=daily.map(d=>{let p=num(d.profit),hz=Math.round(Math.abs(p)/max*100);let cl=p>0?'':p<0?'neg':'zero';let title=`${goalDateStr(d.date)} · ${p?fmt(p):'no flips'}`;return `<div class="goalDayBar ${cl}" style="height:${p?Math.max(6,hz):4}%" title="${esc(title)}"></div>`}).join('');
  let tot=daily.reduce((a,d)=>a+num(d.profit),0),pos=daily.filter(d=>num(d.profit)>0).length;
  return `<div class="goalDaily">${bars}</div><div class="compactNote" style="margin-top:7px">${pos}/30 green days · <span class="${cls(tot)}">${fmt(tot)}</span> over the last 30 days</div>`;
}
function initGoalCard(){
  // animated count-up of the hero number (first mount only), progress-fill grow, live ticker
  let big=document.getElementById('goalBigNum');
  if(big){let target=num(big.dataset.target);
    if(!GOAL_ANIM_DONE){GOAL_ANIM_DONE=true;let t0=performance.now(),dur=1100;
      let step=now=>{let k=Math.min(1,(now-t0)/dur),e=1-Math.pow(1-k,3);big.textContent=fmt(Math.round(target*e));if(k<1)requestAnimationFrame(step)};
      requestAnimationFrame(step);}
    else big.textContent=fmt(target);}
  let fill=document.getElementById('goalFill');
  if(fill)setTimeout(()=>{let f=document.getElementById('goalFill');if(f)f.style.width=(num(f.dataset.pct))+'%'},40);
  // live ticker
  if(GOAL_LIVE_TIMER){clearInterval(GOAL_LIVE_TIMER);GOAL_LIVE_TIMER=null}
  let liveEl=document.getElementById('goalLiveNum');
  if(liveEl){let base=num(liveEl.dataset.base),rate=num(liveEl.dataset.rate),t0=Date.now();
    if(rate>0){GOAL_LIVE_TIMER=setInterval(()=>{let el=document.getElementById('goalLiveNum');if(!el){clearInterval(GOAL_LIVE_TIMER);GOAL_LIVE_TIMER=null;return}let v=base+rate*((Date.now()-t0)/1000);el.textContent=fmtGp(v)},1000);}}
}
function renderBankroll(){

  let owed=num(bp.owed),netNote=owed>0?`owe ${fmt(owed)} → ${fmt(netWorth-owed)} yours`:`incl. ${fmt(unrl)} unrealized`;
  let ctx={total:num(tot.total_current)||1,maxAbsProfit:Math.max(1,...accounts.map(a=>Math.abs(num(a.profit_since_baseline))))};
  let kpis=`<div class="grid statsKpiGrid bankrollKpis">${neutralKpi('Net worth',netWorth,netNote)}${neutralKpi('Cash bankroll',tot.total_current,`${fmt(tot.total_start)} started`)}${kpi('P/L since baseline',tot.total_profit_since_baseline,roi!=null?`ROI ${roi}%`:'realized')}${kpi('This week',tot.total_week_profit,'last 7 days')}${kpi('Today',tot.total_today_profit,'so far')}</div>`;

}

function resFilteredRows(){
  let d=RESEARCH_DATA||{},rows=(RESEARCH_VIEW==='market'?d.opportunities:d.flipped)||[];
  let q=String(RES_SEARCH||'').trim().toLowerCase(),f=RES_FILTERS;
  rows=rows.filter(x=>{
    let nm=resName(x).toLowerCase();
    if(q&&!(nm.includes(q)||String(x.item_id||'').includes(q)))return false;
    if(f.profitable&&!(RESEARCH_VIEW==='market'?num(x.margin_after_tax)>0:num(x.profit)>0))return false;
    if(f.blocked&&!x.blocked)return false;
    if(f.notBlocked&&x.blocked)return false;
    if(f.liquid&&num(x.hourly_volume)<100)return false;
    if(f.members&&!x.members)return false;
    return true;
  });
  rows.sort((a,b)=>{let av=resRowVal(a,RES_SORT_KEY),bv=resRowVal(b,RES_SORT_KEY);let c=av>bv?1:av<bv?-1:0;return RES_SORT_DIR==='asc'?c:-c});
  return rows;
}

function blSetCompareMode(m){BL_COMPARE_MODE=m;BL_CAP=300;render()}

function blRowVal(x,key){let pst=x.personal||{};if(key==='name')return String(x.name||'').toLowerCase();if(key==='profit')return num(pst.profit);if(key==='winrate')return num(pst.win_rate);if(key==='flips')return num(pst.n);return num(x[key])}
function blFilteredRows(){
  let d=BLOCKLIST_DATA||{};
  let rows=(BL_VIEW==='blocked'?d.blocked_items:d.allowed_items)||[];
  let q=String(BLOCKLIST_SEARCH||'').trim().toLowerCase(), f=BL_FILTERS, r=BL_RANGE;
  let pMin=blNumF(r.priceMin),pMax=blNumF(r.priceMax),vMin=blNumF(r.volMin),roiMin=blNumF(r.roiMin),sMin=blNumF(r.spreadMin);
  let tempIds=new Set(((d.temp_blocks||[]).map(t=>Number(t.item_id))));
  let cmp=blCompareSet();
  rows=rows.filter(x=>{
    let pst=x.personal||{},prof=num(pst.profit),n=num(pst.n),id=Number(x.item_id||x.id);
    if(q&&!(String(x.name||'').toLowerCase().includes(q)||String(id).includes(q)))return false;
    if(f.highValue&&num(x.price)<20000000)return false;
    if(f.liquid&&num(x.hourly_volume)<100)return false;
    if(f.history&&!n)return false;
    if(f.members&&!x.members)return false;
    if(f.f2p&&x.members)return false;
    if(f.winner&&!(n&&prof>0))return false;
    if(f.loser&&!(n&&prof<0))return false;
    if(f.never&&n)return false;
    if(f.spread&&num(x.spread_after_tax)<=0)return false;
    if(f.temp&&!tempIds.has(id))return false;
    if(pMin!=null&&num(x.price)<pMin)return false;
    if(pMax!=null&&num(x.price)>pMax)return false;
    if(vMin!=null&&dayVol(x)<vMin)return false;
    if(roiMin!=null&&num(x.roi)<roiMin)return false;
    if(sMin!=null&&num(x.spread_after_tax)<sMin)return false;
    if(cmp&&BL_COMPARE_MODE!=='all'){let there=cmp.has(id),differs=(BL_VIEW==='blocked')?!there:there;if(BL_COMPARE_MODE==='differ'&&!differs)return false;if(BL_COMPARE_MODE==='same'&&differs)return false}
    return true;
  });
  rows.sort((a,b)=>{let av=blRowVal(a,BL_SORT_KEY),bv=blRowVal(b,BL_SORT_KEY);let c=av>bv?1:av<bv?-1:0;return BL_SORT_DIR==='asc'?c:-c});
  return rows;
}
function blItemRow(x){
  let pst=x.personal||{}, id=x.item_id||x.id, blocked=BL_VIEW==='blocked', cmp=blCompareSet();
  let action=blocked?'allow':'block', label=blocked?'Unblock':'Block', acl=blocked?'allow':'block';
  let net=pst.n?`<span class="${cls(pst.profit||0)}">${fmt(pst.profit)}</span> <span class="muted tiny">· ${pst.n}</span>`:'<span class="muted">—</span>';
  let wr=pst.n?`<span class="${pst.win_rate>=50?'green':'red'}">${pst.win_rate}%</span>`:'<span class="muted">—</span>';
  let roi=num(x.roi), roiStr=Math.abs(roi)>999?(roi>0?'>999%':'—'):roi.toFixed(1)+'%';
  let mem=x.members?'<span class="blMemDot m" title="Members item">P2P</span>':'<span class="blMemDot f" title="Free-to-play item">F2P</span>';
  let cmpCell='';
  if(cmp){let there=cmp.has(Number(id));cmpCell=`<td class="num">${there?'<span class="blCmpBadge blk">blocked</span>':'<span class="blCmpBadge alw">allowed</span>'}</td>`}
  let tempBtn=blocked?'':`<button class="blAct temp" ${BL_BUSY?'disabled':''} title="Temporarily block — auto-allows back after the chosen time" onclick="tempBlockItem(${id},BL_TEMP_MIN)">⏱ Temp</button>`;
  return `<tr><td><div class="itemCell">${itemIcon(x.name,x)}<span>${esc(x.name)}</span>${mem}</div></td><td class="num">${fmt(x.price||0)}</td><td class="num">${fmt(dayVol(x))}/day</td><td class="num ${cls(x.spread_after_tax||0)}">${fmt(x.spread_after_tax||0)}</td><td class="num">${roiStr}</td><td class="num">${wr}</td><td class="num">${net}</td>${cmpCell}<td class="num"><div class="blActCell">${tempBtn}<button class="blAct ${acl}" ${BL_BUSY?'disabled':''} onclick="updateBlocklistItem('${action}',${id})">${label}</button></div></td></tr>`;
}
function blSummaryHtml(rows){
  let n=rows.length, traded=rows.filter(x=>num((x.personal||{}).n)), tnet=traded.reduce((s,x)=>s+num((x.personal||{}).profit),0);
  let mem=rows.filter(x=>x.members).length, roiv=rows.map(x=>num(x.roi)).filter(v=>v>0), avgRoi=roiv.length?roiv.reduce((a,b)=>a+b,0)/roiv.length:0;
  let dvol=rows.reduce((s,x)=>s+dayVol(x),0);
  return `<div class="blSummary">
    <div class="blSumItem"><span class="l">Matching</span><span class="v">${fmt(n)}</span></div>
    <div class="blSumItem"><span class="l">Traded by me</span><span class="v">${fmt(traded.length)}</span></div>
    <div class="blSumItem"><span class="l">Your net on these</span><span class="v ${cls(tnet)}">${fmt(tnet)}</span></div>
    <div class="blSumItem"><span class="l">Avg ROI</span><span class="v">${avgRoi.toFixed(1)}%</span></div>
    <div class="blSumItem"><span class="l">Total vol/day</span><span class="v">${fmt(dvol)}</span></div>
    <div class="blSumItem"><span class="l">P2P / F2P</span><span class="v">${fmt(mem)}/${fmt(n-mem)}</span></div>
    <div class="blExport"><button class="btn blMini" onclick="blCopyIds()" title="Copy the item IDs of every matching item">⧉ Copy IDs</button><button class="btn blMini" onclick="blExportCsv()" title="Download the matching items as CSV">⬇ CSV</button></div>
  </div>`;
}
function blListHtml(){
  let rows=blFilteredRows(), shown=rows.slice(0,BL_CAP), blocked=BL_VIEW==='blocked', cmp=blCompareSet();
  let cmpHead=cmp?`<th class="num">In “${esc(BL_COMPARE)}”</th>`:'';
  let span=cmp?9:8;
  let head=`<thead><tr>${blSortHead(blocked?'Blocked item':'Allowed item','name')}${blSortHead('Price','price','num')}${blSortHead('Vol/day','hourly_volume','num')}${blSortHead('Spread','spread_after_tax','num')}${blSortHead('ROI','roi','num')}${blSortHead('Win%','winrate','num')}${blSortHead('Your net','profit','num')}${cmpHead}<th class="num">Action</th></tr></thead>`;
  let body=shown.map(blItemRow).join('')||`<tr><td colspan="${span}" class="empty">No ${blocked?'blocked':'allowed'} items match your search and filters</td></tr>`;
  let more=rows.length>shown.length?`<button class="blMoreBtn" onclick="BL_CAP+=300;blOnSearch(BLOCKLIST_SEARCH)">Show ${Math.min(300,rows.length-shown.length)} more (${fmt(rows.length-shown.length)} hidden)</button>`:'';
  let foot=`<div class="blFoot"><span>Showing ${shown.length} of ${fmt(rows.length)} ${blocked?'blocked':'allowed'} items</span><span>${BL_BUSY?'Saving to Copilot…':'Block / Unblock applies instantly'}</span></div>`;
  return `${blSummaryHtml(rows)}<div class="blTableWrap"><table>${head}<tbody>${body}</tbody></table></div>${more}${foot}`;
}
function blCopyIds(){let r=blFilteredRows(),ids=r.map(x=>x.item_id||x.id).join(',');navigator.clipboard.writeText(ids).then(()=>{if(window.toast)toast(`Copied ${r.length} item IDs`)}).catch(()=>{});}
function blExportCsv(){
  let rows=blFilteredRows();
  let head=['item_id','name','members','price','vol_per_day','spread_after_tax','roi_pct','win_rate','my_flips','my_net'];
  let lines=[head.join(',')];
  rows.forEach(x=>{let p=x.personal||{};lines.push([x.item_id||x.id,'"'+String(x.name||'').replace(/"/g,'""')+'"',x.members?'P2P':'F2P',x.price||0,dayVol(x),x.spread_after_tax||0,x.roi||0,p.win_rate||0,p.n||0,p.profit||0].join(','))});
  let blob=new Blob([lines.join('\n')],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`blocklist_${BL_VIEW}_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}

function fmtRemain(sec){sec=Math.max(0,Math.floor(num(sec)));let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return h?`${h}h ${String(m).padStart(2,'0')}m`:(m?`${m}m ${String(s).padStart(2,'0')}s`:`${s}s`)}

function tempBlockTick(){
  let els=document.querySelectorAll('.tbRemain[data-rem]');if(!els.length)return;

function chartRangeClass(r){return ITEM_CHART_RANGE===r?'active':''}
function chartRangeControls(){return `<div class="chartRangeControls">${['1d','3d','7d','30d','90d','180d','1y'].map(r=>`<button class="${chartRangeClass(r)}" onclick="setItemChartRange('${r}')">${r}</button>`).join('')}</div>`}
function setItemChartRange(range){if(ITEM_CHART_RANGE===range)return;ITEM_CHART_RANGE=range;ITEM_CHART_SELECTED=null;ITEM_VOLUME_SELECTED=null;ITEM_PAGE_DETAIL=null;fetchItemPage(itemPageSlugFromLocation())}
function chartBucketLabel(){let t=chartTimestep();return t==='5m'?'5m':t==='24h'?'daily':t==='6h'?'6h':'hourly'}
function pointTime(p){return p?.timestamp?dt(p.timestamp*1000):'—'}
function selectChartPoint(i){ITEM_CHART_SELECTED=i;render()}
function selectVolumePoint(i){ITEM_VOLUME_SELECTED=i;render()}
function selectedPriceDetail(pts){let i=ITEM_CHART_SELECTED;if(i===null||!pts[i])return `<div class="compactNote">Click chart point for exact time + prices.</div>`;let p=pts[i],h=num(p.avgHighPrice),l=num(p.avgLowPrice),mid=chartMidPrice(p),gap=h&&l?h-l:0;return `<div class="selectedPriceDetail"><div class="label">${esc(pointTime(p))}</div><div class="detailGrid"><div>Mid price<b>${fmtGp(mid)}</b></div><div>Instant-buy avg<b>${h?fmtGp(h):'—'}</b></div><div>Instant-sell avg<b>${l?fmtGp(l):'—'}</b></div><div>Buy/sell gap<b>${gap?fmtGp(gap):'—'}</b></div></div></div>`}
function selectedVolumeDetail(rows){let i=ITEM_VOLUME_SELECTED;if(i===null||!rows[i])return `<div class="compactNote">Click volume bar for exact time + buy/sell volume.</div>`;let p=rows[i],buy=num(p.highPriceVolume),sell=num(p.lowPriceVolume);return `<div class="selectedVolumeDetail"><div class="label">${esc(pointTime(p))}</div><div class="detailGrid"><div>Buy volume<b>${fmt(buy)}</b></div><div>Sell volume<b>${fmt(sell)}</b></div><div>Total volume<b>${fmt(buy+sell)}</b></div><div>Bucket<b>${chartBucketLabel()}</b></div></div></div>`}

function priceChart(points){/* Legacy test string: fmtGp(v) */
  let pts=(points||[]).filter(p=>chartMidPrice(p)), vals=pts.map(chartMidPrice);
  if(vals.length<2)return '<div class="empty">No chart data</div>';
  let min=Math.min(...vals), max=Math.max(...vals), pad=Math.max(1,(max-min)*0.08), lo=min-pad, hi=max+pad;
  let w=920,h=288,chartLeftPad=92,chartBottomPad=38,plotW=w-chartLeftPad-12,span=hi-lo||1;
  let xy=(v,i)=>[Math.round(chartLeftPad+i/(vals.length-1)*plotW),Math.round(h-chartBottomPad-(v-lo)/span*(h-chartBottomPad-12))];
  let coords=vals.map((v,i)=>xy(v,i).join(',')).join(' ');
  let priceTicks=[max,(max+min)/2,min].map(v=>{let y=xy(v,0)[1];return `<g><line x1="${chartLeftPad}" x2="${w-12}" y1="${y}" y2="${y}" stroke="rgba(130,146,166,.16)"/><text x="${chartLeftPad-8}" y="${Math.max(12,y-6)}" fill="var(--muted)" font-size="13" font-weight="700" text-anchor="end">${fmtAxisGp(v)}</text></g>`}).join('');
  let labelAt=(idx,anchor)=>{let p=pts[idx],x=xy(vals[idx],idx)[0];return `<text x="${x}" y="${h-8}" fill="var(--muted)" font-size="12" font-weight="650" text-anchor="${anchor}">${esc(pointTime(p))}</text>`};let mid=Math.floor((pts.length-1)/2);let chartXAxisLabels=`<g class="chartXAxisLabels">${labelAt(0,'start')}${labelAt(mid,'middle')}${labelAt(pts.length-1,'end')}</g>`;let hit=pts.map((p,i)=>{let [x,y]=xy(vals[i],i);return `<circle class="pointHit" onclick="selectChartPoint(${i})" cx="${x}" cy="${y}" r="7" fill="rgba(231,184,92,.08)"></circle>`}).join('');
  let hoverPts=pts.map((p,i)=>{let [x,y]=xy(vals[i],i);return {x,y,l:`<b>${fmtGp(vals[i])}</b><div class="muted">${esc(pointTime(p))}</div>`}});
  return `<div class="chartTitle"><b>Price history</b><span class="compactNote">${ITEM_CHART_RANGE} · ${chartBucketLabel()} midpoint</span></div><svg class="priceChart hoverChart" viewBox="0 0 ${w} ${h}" style="width:100%;height:305px" data-color="#f5a623" data-points="${esc(JSON.stringify(hoverPts))}">${priceTicks}${chartXAxisLabels}<polyline points="${coords}" fill="none" stroke="var(--amber)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>${hit}</svg>${selectedPriceDetail(pts)}`;
}

function itemPageSlugFromLocation(){let p=location.pathname;return p.startsWith('/item/')?decodeURIComponent(p.slice(6)):''}
function marketPrice(d){let h=num(d?.latest?.high),l=num(d?.latest?.low);return h&&l?Math.round((h+l)/2):(h||l||0)}
function geTax(v){return Math.min(Math.floor(num(v)*0.02),5000000)}
function statBox(label,value,note='',forceClass=''){return `<div class="statBox"><div class="l">${esc(label)}</div><div class="v ${forceClass}">${esc(value)}</div>${note?`<div class="n muted">${esc(note)}</div>`:''}</div>`}
function performanceStats(chart){let pts=(chart||[]).filter(p=>num(p.avgHighPrice||p.avgLowPrice));if(!pts.length)return {open:0,close:0,low:0,high:0,perf:0,buyVol:0,sellVol:0,ratio:0};let vals=pts.map(p=>num(p.avgHighPrice||p.avgLowPrice));let open=vals[0],close=vals[vals.length-1],low=Math.min(...vals),high=Math.max(...vals);let buyVol=pts.reduce((a,p)=>a+num(p.highPriceVolume),0),sellVol=pts.reduce((a,p)=>a+num(p.lowPriceVolume),0);return {open,close,low,high,perf:open?((close-open)/open*100):0,buyVol,sellVol,ratio:sellVol?buyVol/sellVol:0}}
function volumeChart(points){/* Legacy test string: Market depth */let rows=(points||[]).slice(-72),vals=rows.map(p=>num(p.highPriceVolume)+num(p.lowPriceVolume));if(!vals.length)return'<div class="empty">No volume data</div>';let max=Math.max(...vals,1),plotW=720,h=130,volumeLeftPad=72,volumeBottomPad=34,w=plotW+volumeLeftPad+12,bw=plotW/vals.length;let bars=vals.map((v,i)=>`<rect class="pointHit" onclick="selectVolumePoint(${i})" x="${Math.round(volumeLeftPad+i*bw)}" y="${Math.round(h-(v/max*h))}" width="${Math.max(2,Math.floor(bw-1))}" height="${Math.round(v/max*h)}" fill="${ITEM_VOLUME_SELECTED===i?'var(--amber)':i%2?'rgba(88,166,255,.72)':'rgba(67,209,122,.72)'}" rx="2"><title>${esc(pointTime(rows[i]))} · ${fmt(v)} volume</title></rect>`).join('');let volumeTicks=[max,max/2,0].map(v=>{let y=Math.round(h-(v/max*h));return `<g><line x1="${volumeLeftPad}" x2="${volumeLeftPad+plotW}" y1="${y}" y2="${y}" stroke="rgba(130,146,166,.13)"/><text x="${volumeLeftPad-8}" y="${Math.max(12,y-4)}" fill="var(--muted)" font-size="12" text-anchor="end">${v===0?'0':fmt(v)}</text></g>`}).join('');let labelAt=(idx,anchor)=>{let p=rows[idx],x=Math.round(volumeLeftPad+idx*bw);return `<text x="${x}" y="${h+volumeBottomPad-8}" fill="var(--muted)" font-size="12" font-weight="650" text-anchor="${anchor}">${esc(pointTime(p))}</text>`};let mid=Math.floor((rows.length-1)/2);let volumeXAxisLabels=`<g class="volumeXAxisLabels">${labelAt(0,'start')}${labelAt(mid,'middle')}${labelAt(rows.length-1,'end')}</g>`;let hoverPts=rows.map((p,i)=>{let v=num(p.highPriceVolume)+num(p.lowPriceVolume);return {x:volumeLeftPad+i*bw+bw/2,y:Math.round(h-(v/max*h)),l:`<b>${fmt(v)} vol</b><div class="muted">buy ${fmt(num(p.highPriceVolume))} · sell ${fmt(num(p.lowPriceVolume))}</div><div class="muted">${esc(pointTime(p))}</div>`}});return `<div class="chartTitle"><b>Buy/Sell Volume</b><span class="compactNote">${chartBucketLabel()} volume buckets <span class="volumeLegend"><span><i class="legendDot buyDot"></i>Buy volume</span><span><i class="legendDot sellDot"></i>Sell volume</span></span></span></div><svg class="volumeChart hoverChart" viewBox="0 0 ${w} ${h+volumeBottomPad}" style="width:100%;height:178px" data-color="#58a6ff" data-points="${esc(JSON.stringify(hoverPts))}"><g class="volumeTicks">${volumeTicks}</g>${bars}${volumeXAxisLabels}</svg>${selectedVolumeDetail(rows)}`}

function combinedChart(points,cw,ch){
  let pts=(points||[]).filter(p=>num(p.avgHighPrice)||num(p.avgLowPrice));
  if(pts.length<2)return '<div class="empty">No chart data</div>';
  let highs=pts.map(p=>num(p.avgHighPrice)||num(p.avgLowPrice));   // SELL line (instant-buy / wiki high)
  let lows=pts.map(p=>num(p.avgLowPrice)||num(p.avgHighPrice));    // BUY line (instant-sell / wiki low)
  let sVol=pts.map(p=>num(p.highPriceVolume)), bVol=pts.map(p=>num(p.lowPriceVolume));
  let mids=highs.map((h,i)=>(h+lows[i])/2);
  let allP=highs.concat(lows).filter(v=>v>0);
  let pmin=Math.min(...allP),pmax=Math.max(...allP),pad=Math.max(1,(pmax-pmin)*0.08),lo=pmin-pad,hi=pmax+pad,span=hi-lo||1;
  let vmax=Math.max(...sVol.map((v,i)=>v+bVol[i]),1);
  // cw/ch: actual card pixel size from fitItemChart so text renders 1:1 (no shrunken fonts)
  let w=cw||1180,h=ch||520,leftPad=92,rightPad=14,topPad=18,xAxisPad=30,volBandH=Math.max(64,Math.round(h*0.17)),gap=22;
  let plotW=w-leftPad-rightPad,n=pts.length;
  let volBottom=h-xAxisPad, volTop=volBottom-volBandH, priceBottom=volTop-gap, priceTop=topPad;
  let px=i=>+(leftPad+(n>1?i/(n-1):0)*plotW).toFixed(1);
  let py=v=>+(priceBottom-(v-lo)/span*(priceBottom-priceTop)).toFixed(1);
  let line=arr=>arr.map((v,i)=>px(i)+','+py(v)).join(' ');
  // moving-average of the mid price (smooth trend line)
  let win=Math.max(2,Math.round(n/12));
  let ma=mids.map((_,i)=>{let a=Math.max(0,i-win+1),s=0,c=0;for(let j=a;j<=i;j++){s+=mids[j];c++}return s/c});
  let priceTicks=[pmax,(pmax*3+pmin)/4,(pmax+pmin)/2,(pmax+pmin*3)/4,pmin].map(v=>{let y=py(v);return `<g><line x1="${leftPad}" x2="${w-rightPad}" y1="${y}" y2="${y}" stroke="rgba(130,146,166,.10)"/><text x="${leftPad-8}" y="${Math.max(12,y-5)}" fill="var(--muted)" font-size="12.5" font-weight="700" text-anchor="end">${fmtAxisGp(v)}</text></g>`}).join('');
  // stacked buy/sell volume bars (orange = buy, green = sell)
  let step=plotW/Math.max(1,n-1), barW=Math.max(1,Math.floor(Math.min(step*0.66,11)));
  let bars=pts.map((p,i)=>{let bh=Math.round(bVol[i]/vmax*volBandH),sh=Math.round(sVol[i]/vmax*volBandH),x=px(i)-Math.floor(barW/2);
    return `<rect x="${x}" y="${volBottom-bh}" width="${barW}" height="${bh}" fill="rgba(245,166,35,.5)"/><rect x="${x}" y="${volBottom-bh-sh}" width="${barW}" height="${sh}" fill="rgba(52,199,123,.5)"/>`}).join('');
  let volLabels=`<text x="${leftPad-8}" y="${volTop+11}" fill="var(--muted)" font-size="11" text-anchor="end">${fmt(vmax)}</text><text x="${leftPad-8}" y="${volBottom}" fill="var(--muted)" font-size="11" text-anchor="end">vol</text>`;
  let divider=`<line x1="${leftPad}" x2="${w-rightPad}" y1="${volTop-gap/2}" y2="${volTop-gap/2}" stroke="rgba(130,146,166,.10)"/>`;
  // current-buy reference line (latest low) with right-aligned label
  let curBuy=lows[n-1],refY=py(curBuy);
  let refLine=curBuy?`<line x1="${leftPad}" x2="${w-rightPad}" y1="${refY}" y2="${refY}" stroke="rgba(88,166,255,.5)" stroke-width="1.2" stroke-dasharray="5 4"/><text x="${w-rightPad-4}" y="${Math.max(13,refY-5)}" fill="#7db8ff" font-size="12" font-weight="800" text-anchor="end">BUY · ${fmtGp(curBuy)}</text>`:'';
  let labelAt=(idx,anchor)=>`<text x="${px(idx)}" y="${h-8}" fill="var(--muted)" font-size="12" font-weight="650" text-anchor="${anchor}">${esc(pointTime(pts[idx]))}</text>`;
  let mid=Math.floor((n-1)/2);
  let xLabels=`<g class="chartXAxisLabels">${labelAt(0,'start')}${labelAt(mid,'middle')}${labelAt(n-1,'end')}</g>`;
  let hit=pts.map((p,i)=>`<circle class="pointHit" onclick="selectChartPoint(${i})" cx="${px(i)}" cy="${py(mids[i])}" r="7" fill="transparent"></circle>`).join('');
  let hoverPts=pts.map((p,i)=>({x:px(i),y:py(highs[i]),l:
    `<div class="ctTime">${esc(pointTime(p))}</div>`+
    `<div class="ctRow"><span class="ctk sell">Sell</span><b>${fmtGp(highs[i])}</b></div>`+
    `<div class="ctRow"><span class="ctk buy">Buy</span><b>${fmtGp(lows[i])}</b></div>`+
    `<div class="ctRow"><span class="ctk">Spread</span><b>${fmtGp(Math.max(0,highs[i]-lows[i]))}</b></div>`+
    `<div class="ctRow"><span class="ctk">Sell vol</span><b>${fmt(sVol[i])}</b></div>`+
    `<div class="ctRow"><span class="ctk">Buy vol</span><b>${fmt(bVol[i])}</b></div>`}));
  let legend=`<div class="miChartLegend"><span><i class="lgl" style="background:#34c77b"></i>High (sell)</span><span><i class="lgl" style="background:#ff5d5d"></i>Low (buy)</span><span><i class="lgl dash" style="background:#9aa7b8"></i>${chartBucketLabel()} MA</span><span><i class="lgl dash" style="background:#7db8ff"></i>Live buy</span><span><i class="lgl" style="background:rgba(52,199,123,.6)"></i>Sell vol</span><span><i class="lgl" style="background:rgba(245,166,35,.6)"></i>Buy vol</span></div>`;
  return `<div class="chartTitle"><b>${esc((ITEM_PAGE_DETAIL&&ITEM_PAGE_DETAIL.item&&ITEM_PAGE_DETAIL.item.name)||'Price')}</b><span class="compactNote">${ITEM_CHART_RANGE} · ${chartBucketLabel()} · green = sell · red = buy</span></div><svg class="priceChart hoverChart" viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;aspect-ratio:${w}/${h}" data-color="rgba(125,211,252,.55)" data-points="${esc(JSON.stringify(hoverPts))}">${priceTicks}<g class="volBand">${volLabels}${bars}</g>${divider}${refLine}<polyline points="${line(ma)}" fill="none" stroke="#9aa7b8" stroke-width="1.2" stroke-dasharray="4 4" opacity=".8"/><polyline points="${line(lows)}" fill="none" stroke="#ff5d5d" stroke-width="1.7" stroke-linejoin="round"/><polyline points="${line(highs)}" fill="none" stroke="#34c77b" stroke-width="1.7" stroke-linejoin="round"/>${hit}${xLabels}</svg>${legend}${selectedPriceDetail(pts)}`;
}
function acctBarsHtml(byAcc){let entries=Object.entries(byAcc||{});if(!entries.length)return '';let max=Math.max(...entries.map(([,v])=>Math.abs(num(v.profit))),1);return `<div class="acctBars">${entries.sort((a,b)=>num(b[1].profit)-num(a[1].profit)).map(([acc,v])=>`<div class="acctBar"><span class="nm">${esc(acc)}</span><div class="track"><div class="fill" style="width:${Math.max(2,Math.abs(num(v.profit))/max*100).toFixed(0)}%${num(v.profit)<0?';background:linear-gradient(90deg,#c0392b,#ff646f)':''}"></div></div><span class="val ${cls(v.profit)}">${fmt(v.profit)} · ${v.n}</span></div>`).join('')}</div>`}
function hourStripHtml(fs){let dist=fs.hour_distribution||{},best=fs.best_hour,max=Math.max(...Object.values(dist).map(num),1),bars='';for(let h=0;h<24;h++){let c=num(dist[h]);bars+=`<div class="hourBar${h===best?' best':''}" style="height:${c?Math.max(8,c/max*100):0}%" title="${h}:00 · ${c} sells"></div>`}return `<div class="hourStrip">${bars}</div><div class="hourAxis"><span>00</span><span>06</span><span>12</span><span>18</span><span>23</span></div>`}
function renderFlippingStats(fs){
  if(!fs||!fs.available)return `<div class="card sideCard"><div class="sideTitle">Your flip record</div><div class="muted" style="font-size:12px;line-height:1.5">No finished flips on this item from your active accounts yet. Live market research works for every tradeable item.</div></div>`;
  let hours=(fs.hour_distribution&&Object.keys(fs.hour_distribution).length)?`<div class="bestHoursLbl">Your sell hours${fs.best_hour!=null?` · best ${fs.best_hour}:00`:''}</div>${hourStripHtml(fs)}`:'';
  return `<div class="card sideCard">
    <div class="sideTitle">Your flip record<span class="sideScope">${esc(fs.scope_label||'all time')}</span></div>
    <div class="flipMiniGrid">
      <div class="flipMini"><div class="l">Total profit</div><div class="v ${cls(fs.profit)}">${fmt(fs.profit||0)}</div></div>
      <div class="flipMini"><div class="l">Flips</div><div class="v">${fmt(fs.n||0)}</div><div class="n">${fs.win_rate??0}% win rate</div></div>
      <div class="flipMini"><div class="l">Avg / flip</div><div class="v ${cls(fs.avg_profit)}">${fmt(fs.avg_profit||0)}</div></div>
      <div class="flipMini"><div class="l">Median hold</div><div class="v">${fs.med_dur_h??'—'}h</div></div>
    </div>${hours}</div>`;
}
function renderRecentFlips(fs){
  if(!fs||!fs.available)return '';
  let flips=fs.flips||[];
  let acctShort=a=>String(a||'-').trim();
  let flipRows=flips.map(f=>`<tr><td>${f.last_sell?dt(f.last_sell):'-'}</td><td>${esc(acctShort(f.account))}</td><td class="num">${f.avg_buy?fmt(f.avg_buy):'-'}</td><td class="num">${f.avg_sell?fmt(f.avg_sell):'-'}</td><td class="num ${cls(f.profit)}">${fmt(f.profit)}</td><td class="num">${f.dur_h!=null?f.dur_h+'h':'-'}</td></tr>`).join('')||'<tr><td colspan="6" class="empty">No finished flips</td></tr>';
  return `<div class="section itemSubsection">Recent flips · ${fmt(flips.length)}</div>
    <div class="card recentTx"><div class="tblScroll"><table><thead><tr><th>Sold</th><th>Account</th><th class="num">Buy</th><th class="num">Sell</th><th class="num">Profit</th><th class="num">Hold</th></tr></thead><tbody>${flipRows}</tbody></table></div></div>`;
}
function flipCell(label,value,sub,hl){return `<div class="flipCell${hl?' hl':''}"><div class="l">${esc(label)}</div><div class="v ${hl?'green':''}">${esc(value)}</div>${sub?`<div class="s">${esc(sub)}</div>`:''}</div>`}
function flipSignalStrip(ms){
  let buy=num(ms.instant_buy),sell=num(ms.instant_sell),margin=num(ms.margin_after_tax),roi=ms.roi_pct,ppl=num(ms.profit_per_limit),tax=num(ms.tax);
  return `<div class="flipSignal v2">
    ${flipCell('Buy at',sell?fmt(sell):'—',sell?fmtGp(sell):'instant-sell price')}
    ${flipCell('Sell at',buy?fmt(buy):'—',buy?fmtGp(buy):'instant-buy price')}
    ${flipCell('Margin / item',margin?fmt(margin):'—','after 2% GE tax',margin>0)}
    ${flipCell('ROI',roi!=null?resRoi(roi):'—','return on buy price')}
    ${flipCell('Profit / limit',ppl?fmt(ppl):'—','full 4h limit cycle',ppl>0)}
    ${flipCell('GE tax',tax?fmt(tax):'—','per item sold')}
  </div>`;
}
async function toggleItemBlock(id,block){if(ITEM_BLOCK_BUSY||!id)return;ITEM_BLOCK_BUSY=true;render();try{await fetchJson('/api/blocklist/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:block?'block':'allow',item_id:Number(id)})});BLOCKLIST_DATA=null;RESEARCH_DATA=null;ITEM_PAGE_DETAIL=null;await fetchItemPage(itemPageSlugFromLocation())}catch(e){alert(e.message)}finally{ITEM_BLOCK_BUSY=false;render()}}

async function setMembership(name){
  let v=prompt('Membership for '+name+':\n• "recurring" = paid subscription\n• a date YYYY-MM-DD it expires\n• a number = days left from now\n• "auto" = revert to bond tracking',' ');

  else if(v==='recurring')body.mode='recurring';
  else if(/^\d{4}-\d{2}-\d{2}/.test(v)){body.mode='manual';body.expires=v;}
  else if(/^\d+(\.\d+)?$/.test(v)){let dd=new Date();dd.setDate(dd.getDate()+parseFloat(v));body.mode='manual';body.expires=dd.toISOString();}
  else{alert('Unrecognized. Use "recurring", a date (YYYY-MM-DD), a number of days, or "auto".');return;}
  try{let r=await fetchJson('/api/account-settings/membership',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(r&&r.error){alert(r.error);return;}ACCT_DATA=null;fetchAccountSettings();}

}

function flipChart(c){

  let tmin=Math.min(...times),tmax=Math.max(...times);if(buy){tmin=Math.min(tmin,buy.t);tmax=Math.max(tmax,buy.t)}if(sell){tmin=Math.min(tmin,sell.t);tmax=Math.max(tmax,sell.t)}

  let X=t=>+(leftPad+(t-t0)/tspan*plotW).toFixed(1),Y=v=>+(priceBottom-(v-lo)/span*(priceBottom-priceTop)).toFixed(1);
  let line=arr=>arr.map((v,i)=>X(times[i])+','+Y(v)).join(' ');
  let vmax=Math.max(...sVol.map((v,i)=>v+bVol[i]),1);
  let mw=Math.max(2,Math.round(n/12)),ma=mids.map((_,i)=>{let a=Math.max(0,i-mw+1),s=0,cc=0;for(let j=a;j<=i;j++){s+=mids[j];cc++}return s/cc});
  let priceTicks=[pmax,(pmax*3+pmin)/4,(pmax+pmin)/2,(pmax+pmin*3)/4,pmin].map(v=>{let y=Y(v);return `<g><line x1="${leftPad}" x2="${w-rightPad}" y1="${y}" y2="${y}" stroke="rgba(130,146,166,.10)"/><text x="${leftPad-8}" y="${Math.max(12,y-5)}" fill="var(--muted)" font-size="12.5" font-weight="700" text-anchor="end">${fmtAxisGp(v)}</text></g>`}).join('');

  let volLabels=`<text x="${leftPad-8}" y="${volTop+11}" fill="var(--muted)" font-size="11" text-anchor="end">${fmt(vmax)}</text><text x="${leftPad-8}" y="${volBottom}" fill="var(--muted)" font-size="11" text-anchor="end">vol</text>`;
  let divider=`<line x1="${leftPad}" x2="${w-rightPad}" y1="${volTop-gap/2}" y2="${volTop-gap/2}" stroke="rgba(130,146,166,.10)"/>`;
  let hold='';if(buy&&sell){let x1=X(buy.t),x2=X(sell.t);hold=`<rect x="${Math.min(x1,x2)}" y="${priceTop}" width="${Math.abs(x2-x1)||1}" height="${volBottom-priceTop}" fill="rgba(245,166,35,.06)"/>`}

  let vsMid=(price,t)=>{let m=midAt(t);if(!m)return '';let d=(num(price)-m)/m*100;return ' · '+(d<=0?'':'+')+d.toFixed(1)+'%';};

  if(buy){let x=X(buy.t),y=Y(num(buy.price)),rightSide=x<plotW*0.7+leftPad;mk+=`<line x1="${x}" x2="${x}" y1="${priceTop}" y2="${volBottom}" stroke="rgba(0,217,166,.4)" stroke-dasharray="3 4"/><circle cx="${x}" cy="${y}" r="6" fill="#00d9a6" stroke="var(--card)" stroke-width="2.5"/>`+flipMarkerLabel(x,y,'BUY '+fmtAxisGp(buy.price)+vsMid(buy.price,buy.t),'#7fffd9','rgba(0,217,166',rightSide)}

function flipGrade(f,ctx){

  let label=score>=72?'Great':score>=55?'Solid':score>=38?'Decent':'Weak';
  return {letter,label,color};
}

const sparkTipFmt={profit:v=>(v>0?'+':'')+fmt(v),rate:v=>(v>0?'+':'')+fmt(v)+'/h'};
let _sparkOverlay=null;
function sparkOverlay(){if(_sparkOverlay)return _sparkOverlay;let g=document.createElement('div');g.className='sparkGuide';let d=document.createElement('div');d.className='sparkDot';let t=document.createElement('div');t.className='sparkTip';document.body.append(g,d,t);return _sparkOverlay={g,d,t}}
function hideSpark(){if(_sparkOverlay){_sparkOverlay.g.style.opacity=0;_sparkOverlay.d.style.opacity=0;_sparkOverlay.t.style.opacity=0}}
document.addEventListener('mousemove',e=>{
  let svg=e.target.closest&&e.target.closest('.kpi-spark');
  if(!svg||!svg.dataset.spark){hideSpark();return}
  let data;try{data=JSON.parse(svg.dataset.spark)}catch(_){hideSpark();return}
  let vals=data.v,times=data.t,ys=data.y,n=vals.length;
  if(!n||n<2){hideSpark();return}
  let rect=svg.getBoundingClientRect();
  let ratio=Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width));
  let idx=Math.round(ratio*(n-1));
  let px=rect.left+(idx/(n-1))*rect.width;
  let py=rect.top+(ys[idx]/100)*rect.height;
  let col=getComputedStyle(svg.querySelector('path[stroke]')).stroke||'#00d9a6';
  let{g,d,t}=sparkOverlay();
  g.style.left=px+'px';g.style.top=rect.top+'px';g.style.height=rect.height+'px';g.style.background=col;g.style.opacity=.35;
  d.style.left=px+'px';d.style.top=py+'px';d.style.background=col;d.style.opacity=1;
  let when=(times&&times[idx])?dt(times[idx])+' · ':'';
  t.textContent=when+(sparkTipFmt[data.k]||fmt)(vals[idx]);
  t.style.opacity=1;
  let tw=t.offsetWidth||60;
  t.style.left=Math.min(window.innerWidth-tw-8,Math.max(8,px-tw/2))+'px';
  t.style.top=Math.max(8,rect.top-30)+'px';
},{passive:true});
document.addEventListener('mouseleave',hideSpark);

  let rect=svg.getBoundingClientRect();
  let ctm=svg.getScreenCTM&&svg.getScreenCTM();
  if(!ctm||!rect.width){hideChartTip();return}
  let inv=ctm.inverse(),sp=svg.createSVGPoint();
  sp.x=e.clientX;sp.y=e.clientY;
  let mxVb=sp.matrixTransform(inv).x;
  let minX=pts[0].x,maxX=pts[pts.length-1].x;
  if(mxVb<minX-2||mxVb>maxX+2){hideChartTip();return}
  let best=0,bd=Infinity;for(let i=0;i<pts.length;i++){let dd=Math.abs(pts[i].x-mxVb);if(dd<bd){bd=dd;best=i}}
  let p=pts[best],fp=svg.createSVGPoint();fp.x=p.x;fp.y=p.y;
  let scr=fp.matrixTransform(ctm),px=scr.x,py=scr.y,col=svg.dataset.color||'#f5a623';
  let{g,d,t}=chartTipEls();
  g.style.left=px+'px';g.style.top=rect.top+'px';g.style.height=rect.height+'px';g.style.background=col;g.style.opacity=.4;
  d.style.left=px+'px';d.style.top=py+'px';d.style.background=col;d.style.opacity=1;
  t.innerHTML=p.l;t.style.opacity=1;
  let tw=t.offsetWidth||90,th=t.offsetHeight||34;
  t.style.left=Math.min(window.innerWidth-tw-8,Math.max(8,px-tw/2))+'px';
  t.style.top=Math.max(8,py-th-12)+'px';
},{passive:true});
document.addEventListener('mouseleave',hideChartTip);
window.addEventListener('scroll',hideChartTip,{passive:true});
</script>
