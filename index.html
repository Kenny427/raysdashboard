45)}.detailGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.detailGrid div{color:var(--muted);font-size:12px}.detailGrid b{display:block;color:var(--text);font-size:13px;margin-top:2px}.itemSubsection{margin-top:20px}.itemStatsCard{padding:0;background:transparent;border:0;box-shadow:none}.itemStatsGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:rgba(7,16,29,.58)}.summaryStat,.statBox{padding:14px 15px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:86px;background:linear-gradient(180deg,rgba(15,23,36,.46),rgba(7,16,29,.25))}.summaryStat:nth-child(4n){border-right:0}.summaryStat .v,.statBox .v{font-size:18px;font-weight:900;line-height:1.15;margin-top:8px;letter-spacing:-.025em}.summaryStat .compactNote{font-size:12px;margin-top:4px;color:#aebaca}.tradingSnapshotGrid,.performanceStatsGrid{grid-template-columns:repeat(3,minmax(0,1fr))}.tradingSnapshotGrid .summaryStat:nth-child(3n),.performanceStatsGrid .summaryStat:nth-child(3n){border-right:0}.itemPageRight{position:sticky;top:92px}.itemPageRight .section:first-child{margin-top:0}.itemPageRight .grid.four{grid-template-columns:repeat(2,minmax(0,1fr))}.itemPageRight .kpi{min-height:94px}.itemPageRight .kpi .v{font-size:22px}.itemPageRight table{font-size:12px}.itemPageRight th,.itemPageRight td{padding:9px 6px}.itemPageRight th.num,.itemPageRight td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}.itemPageRight .card{background:linear-gradient(180deg,rgba(11,17,26,.86),rgba(7,16,29,.78));border-radius:var(--radius)}

/* Typography balance pass: cleaner numeric face + centered KPI content */
.card.kpi{
  min-height:112px;
  padding:17px 19px 16px 17px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:stretch;
  gap:8px;
}
.kpi .l,.label,.statBox .l,.summaryStat .l,th{
  font-family:"Segoe UI Variable Display","Segoe UI",Inter,Geist,-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
  font-size:11px;
  line-height:1.18;
  letter-spacing:.05em;
  font-weight:900;
  color:#aeb8c8;
}
.kpi .v,.statBox .v,.summaryStat .v,.heroPrice{
  font-family:"Segoe UI Variable Display","Segoe UI",Inter,Geist,-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
  font-variant-numeric:tabular-nums lining-nums;
  font-feature-settings:"tnum" 1,"lnum" 1;
  letter-spacing:-.025em;
  text-rendering:geometricPrecision;
}
.kpi .v{
  font-size:27px;
  line-height:1.0;
  font-weight:850;
  margin:0;
}
.kpi .n{
  font-size:12.5px;
  line-height:1.28;
  color:#bac5d3;
  margin-top:-2px;
}
.statsKpiGrid .card.kpi{min-height:112px}
.four .card.kpi,.liveKpiGrid .card.kpi{min-height:106px}
.marketSpeedCard{padding:18px!important}
.marketSpeedCard .label{margin-bottom:3px}
.marketSpeedCard b{font-weight:760;line-height:1.2}
.title{
  line-height:1.25;
  padding:2px 0 3px;
  font-weight:780;
  letter-spacing:-.025em;
}
.bar{padding:16px 0}
@media(max-width:1180px){.bar,.wrap{width:min(100% - 28px,1520px)}.statsKpiGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.four,.liveKpiGrid,.bestWorstGrid,.twocol{grid-template-columns:repeat(2,minmax(0,1fr))}.itemTopGrid,.itemPageGrid{grid-template-columns:1fr}.itemPageRight{position:static}.itemStatsGrid,.tradingSnapshotGrid,.performanceStatsGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.summaryStat:nth-child(n){border-right:1px solid var(--line)}.detailGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.globalSearch{min-width:104px}.topbar{padding:0 12px!important}.topbar-right{gap:7px!important}.topbar-logo{padding-right:12px!important;margin-right:12px!important}.nav button{padding:8px 7px!important}.nav{gap:1px!important}#updated{display:none}.gpModes{opacity:0;pointer-events:none;transition:opacity .12s}.gpCard:hover .gpModes,.gpCard:focus-within .gpModes{opacity:1;pointer-events:auto;background:rgba(11,17,26,.97);border-radius:8px;padding:2px 3px}}
@media(max-width:680px){body{font-size:13px}.bar{align-items:stretch;grid-template-columns:1fr}.headerTools{justify-content:stretch;width:100%;grid-template-columns:1fr}.csvExportGroup{justify-content:space-between;border-radius:16px;white-space:normal}.globalSearch{width:100%}.searchResults{left:0;right:auto;width:100%}.statsKpiGrid,.four,.liveKpiGrid,.itemStatsGrid,.tradingSnapshotGrid,.performanceStatsGrid,.detailGrid,.setup{grid-template-columns:1fr}.heroPrice{font-size:30px}.itemHeroCard h1{font-size:27px}.sellingRow{grid-template-columns:1fr}.sellingProfit{text-align:left}th,td{padding:9px 6px}.wrap{padding-bottom:30px}}

/* ── New design overrides ── */

/* Hide old sticky header */
.top{display:none!important}

/* Topbar: logo + nav tabs + right controls */
.topbar{
  position:sticky;top:0;z-index:20;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 48px;display:flex;align-items:center;justify-content:space-between;
  height:60px;flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;}
.topbar-logo{
  font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.3px;
  font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;
  padding-right:32px;margin-right:32px;border-right:1px solid var(--border);
  white-space:nowrap;
}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:12px;}

/* Nav tabs inside topbar */
.nav{
  display:flex;align-items:center;gap:2px;
  margin:0;padding:0;background:none;border:none;border-radius:0;flex-wrap:nowrap;
}
.nav button{
  padding:8px 18px;font-size:13px;font-weight:600;
  color:var(--muted)!important;background:transparent!important;
  border:none!important;border-radius:8px!important;cursor:pointer;
  font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;transition:all .15s;
  white-space:nowrap;
}
.nav button:hover{color:var(--text)!important;background:var(--card)!important;}
.nav button.active{color:var(--text)!important;background:var(--card2)!important;}

/* Fetch time label */
.fetch-tag{font-family:'DM Mono',monospace;font-size:12px;color:var(--dimmed);white-space:nowrap;}

/* Refresh icon button */
.topbar-refresh{
  background:transparent!important;border:1px solid var(--border2)!important;color:var(--muted)!important;
  width:34px;height:34px;border-radius:8px!important;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  padding:0;flex-shrink:0;
}
.topbar-refresh:hover{color:var(--text)!important;border-color:var(--accent2)!important;}
.topbar-refresh svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}

/* Toolbar: date range */
.toolbar-row{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 48px;display:flex;align-items:center;gap:4px;
  flex-wrap:wrap;margin:0!important;border-radius:0!important;
}
.toolbar-row.compactRanges{background:var(--surface)!important;border:none!important;border-bottom:1px solid var(--border)!important;border-radius:0!important;padding:10px 48px!important;margin:0!important;}
.compactRanges .label,.toolbar-row .label{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dimmed);margin-right:10px;
}
.ranges button[data-range],#customToggleBtn{
  padding:7px 16px;font-size:12px;font-weight:600;color:var(--muted);
  background:transparent!important;border:1px solid transparent!important;border-radius:7px!important;
  cursor:pointer;font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;transition:all .15s;
}
.ranges button[data-range]:hover,#customToggleBtn:hover{color:var(--text)!important;border-color:var(--border)!important;}
.ranges button.active,#customToggleBtn.active{
  color:var(--accent)!important;border-color:var(--accent2)!important;
  background:rgba(0,217,166,.06)!important;
}
/* Custom date-range picker — match dark theme */
.customRangePanel input[type="datetime-local"]{
  color-scheme:dark;
  background:rgba(7,16,29,.95)!important;border:1px solid var(--line)!important;color:var(--text)!important;
  border-radius:8px!important;padding:7px 10px!important;font-size:12px;outline:none;min-width:172px;
}
.customRangePanel input[type="datetime-local"]:hover{border-color:var(--border2)!important;}
.customRangePanel input[type="datetime-local"]:focus{border-color:rgba(125,211,252,.45)!important;box-shadow:0 0 0 3px rgba(125,211,252,.08)!important;}
.customRangePanel input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(.72);opacity:.6;cursor:pointer}
.customRangePanel input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover{opacity:1}
#customBtn{
  padding:7px 16px!important;font-size:12px!important;font-weight:800!important;border-radius:8px!important;
  background:linear-gradient(180deg,rgba(0,230,168,.95),rgba(34,197,94,.85))!important;color:#02110d!important;
  border:1px solid rgba(0,230,168,.38)!important;cursor:pointer;
}
#customBtn:hover{border-color:rgba(0,230,168,.7)!important;color:#001b14!important;}
.statsDayPick{display:inline-flex;align-items:center;gap:3px;margin-right:10px;padding:2px;border-radius:9px;background:var(--card2);border:1px solid var(--border)}
.statsDayPick.active{border-color:rgba(125,211,252,.5);box-shadow:0 0 0 3px rgba(125,211,252,.08)}
.statsDayArrow{padding:3px 9px!important;font-size:16px!important;line-height:1;font-weight:800;border-radius:7px!important;min-width:0}
.statsDayArrow:disabled{opacity:.3;cursor:not-allowed}

/* Grid gaps — all grids use 16px */
.grid{gap:16px!important;}
.statsKpiGrid,.kpis{grid-template-columns:repeat(5,minmax(0,1fr))!important;gap:16px!important;}
.four{grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:16px!important;}
.liveKpiGrid{grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:16px!important;}
.bestWorstGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px!important;}
.twocol{grid-template-columns:repeat(2,minmax(0,1fr))!important;}

/* Section headers — tight, 0 top margin (gap handles spacing) */
.section{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin:0 0 14px;
}
.label,.statBox .l,.summaryStat .l,th{
  font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dimmed);
}

/* Table rows */
tbody tr.clickable-row{border-left:3px solid transparent;transition:background .1s;}
tbody tr.clickable-row:hover{background:var(--card2);}
td{color:var(--text);font-size:13px;}
th{color:var(--dimmed);}
th,td{border-bottom-color:var(--border);}

/* Pill badges */
.pill{border-radius:6px;}
.pill.ok{color:var(--accent);border-color:rgba(0,217,166,.25);background:rgba(0,217,166,.1);}
.pill.warn{color:var(--amber);border-color:rgba(245,166,35,.25);background:rgba(245,166,35,.08);}

/* Search input */
.search,.input,.globalSearch input,.field input,.field select,.field textarea{
  background:var(--card2)!important;border-color:var(--border)!important;border-radius:8px!important;
}
.search:focus,.globalSearch input:focus{border-color:var(--accent2)!important;box-shadow:0 0 0 3px rgba(0,217,166,.08)!important;}
.searchResults{background:var(--card)!important;border-color:var(--border2)!important;border-radius:12px!important;}
.searchResult{border-bottom-color:var(--border)!important;}

/* Buttons — default */
button{
  font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;
  border-color:var(--border)!important;background:var(--card2)!important;
  color:var(--muted)!important;border-radius:8px!important;
}
button:hover{border-color:var(--border2)!important;color:var(--text)!important;background:var(--card)!important;}
button.save,.save,button.primary,.primary{
  background:var(--accent)!important;color:#001a12!important;
  border-color:transparent!important;font-weight:700!important;box-shadow:none!important;
}
button.save:hover,.save:hover{opacity:.85;}
.sorts button.active,.chartRangeControls button.active{
  background:var(--card2)!important;color:var(--text)!important;border-color:var(--border2)!important;
}

/* Item page */
.itemHeroCard,.itemMarketPrice,.chartCard{
  background:var(--card)!important;border-color:var(--border)!important;border-radius:14px!important;box-shadow:none!important;
}
.itemStatsGrid{background:var(--card2)!important;border-color:var(--border)!important;}
.summaryStat,.statBox{background:var(--card)!important;border-color:var(--border)!important;}
.statBox .v,.summaryStat .v{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;}
.heroPrice{font-family:'DM Mono',monospace;}

/* Modal */
.modal-box{background:var(--card);border:1px solid var(--border);}

/* Bankroll cards */
.bankrollHead .section{margin:0;}
.marketSpeedCard{display:none!important;}/* hide old card — we use .pace now */

/* ── Pace bar (market speed) ── */
.pace{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 28px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;}
.pace-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.35}}
.pace-status{font-size:13px;font-weight:700;margin-right:10px;}
.pace-pipe{width:1px;height:24px;background:var(--border2);margin:0 16px;flex-shrink:0;}
.pace-item{font-size:13px;color:var(--muted);}
.pace-item b{color:var(--text);font-weight:600;}

/* ── Selling banner ── */
.selling{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 22px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s;}
.selling:hover{border-color:var(--border2);}
.selling-badge{background:rgba(0,217,166,.1);color:var(--accent);font-family:'DM Mono',monospace;font-size:13px;padding:4px 12px;border-radius:6px;border:1px solid rgba(0,217,166,.2);}
.selling-text{font-size:13px;font-weight:600;color:var(--text);}
.selling-sub{font-size:12px;color:var(--muted);margin-left:auto;}

/* ── New tbl-card / div-grid item rows ── */
.tbl-card{background:var(--card)!important;border:1px solid var(--border)!important;border-radius:14px!important;overflow:hidden;box-shadow:none!important;}
.tbl-head{padding:14px 22px;border-bottom:1px solid var(--border);}
.tbl-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:8px;font-family:"Segoe UI Variable Display","Segoe UI",sans-serif;}
.tbl-title.g{color:var(--accent);}
.tbl-title.r{color:var(--red);}
.tbl-title svg{flex-shrink:0;}
.col-heads{display:grid;grid-template-columns:1fr 32px 90px 52px 90px;gap:8px;padding:8px 22px 8px 25px;border-bottom:1px solid var(--border);}
.col-h{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dimmed);}
.col-h:not(:first-child){text-align:right;}
.trow{display:grid;grid-template-columns:1fr 32px 90px 52px 90px;gap:8px;padding:10px 22px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .1s;border-left:3px solid transparent;}
.trow:last-child{border-bottom:none;}
.trow:hover{background:var(--card2);}
.trow.win-full{border-left-color:rgba(0,217,166,.45);}
.trow.win-half{border-left-color:rgba(255,77,90,.3);}
.trow.win-none{border-left-color:rgba(255,77,90,.45);}
.trow.highlight-loss{background:rgba(255,77,90,.05);}
.trow.highlight-loss:hover{background:rgba(255,77,90,.09);}
.item-cell{display:flex;align-items:center;gap:10px;min-width:0;}
.icon-wrap{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--card2);border-radius:6px;border:1px solid var(--border2);}
.icon-wrap img{width:24px;height:24px;image-rendering:pixelated;object-fit:contain;}
.iname{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tc{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;text-align:right;display:flex;align-items:center;justify-content:flex-end;}
.tc.g{color:var(--accent);}
.tc.r{color:var(--red);}
.tc.d{color:var(--muted);}
.win-pill{font-family:'DM Mono',monospace;font-size:11px;padding:3px 8px;border-radius:5px;}
.win-pill.g{background:rgba(0,217,166,.1);color:var(--accent);}
.win-pill.r{background:rgba(255,77,90,.1);color:var(--red);}
.win-pill.a{background:rgba(255,77,90,.08);color:#ff8a70;}
.hold-cell{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.hold-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}
.hold-bar-track{width:56px;height:2px;background:var(--border2);border-radius:2px;}
.hold-bar-fill{height:2px;border-radius:2px;}

/* ── KPI sparklines ── */
/* Option 1: subtle bottom-right watermark. It takes zero layout space and never pushes/splits text. */
.kpi-spark{
  position:absolute;
  right:10px;
  bottom:8px;
  left:auto;
  top:auto;
  width:min(48%,136px);
  height:40px;
  opacity:.16;
  pointer-events:auto;
  z-index:0;
  filter:saturate(.9);
  transition:opacity .14s ease, transform .14s ease;
}
.card.kpi{position:relative;overflow:hidden;}
.sparkCard .kpi-content{position:relative;z-index:1;pointer-events:auto;}
.sparkCard:hover .kpi-spark{opacity:.34;transform:translateY(-1px);}
@media (max-width:900px){.kpi-spark{display:none;}}
/* shared hover overlay (guide line + dot + tooltip) */
.sparkGuide{position:fixed;width:1px;margin-left:-.5px;z-index:60;pointer-events:none;opacity:0;transition:opacity .1s;}
.sparkDot{position:fixed;width:8px;height:8px;border-radius:50%;z-index:61;pointer-events:none;opacity:0;transform:translate(-50%,-50%);box-shadow:0 0 0 2px var(--bg);transition:opacity .1s;}
.sparkTip{position:fixed;z-index:62;pointer-events:none;opacity:0;background:var(--card2);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:4px 9px;border-radius:6px;white-space:nowrap;box-shadow:0 6px 18px rgba(0,0,0,.45);transition:opacity .1s;}

/* ── bestWorstGrid spacing ── */
.bestWorstGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;}

/* ── Exact-match pass to reference design ── */
.wrap{padding:36px 48px 56px!important;}
/* KPI value color classes */
.kpi .v.a{color:var(--amber)!important;}
.kpi .v.plain{color:var(--text)!important;}
/* Goal progress bar */
.goal-bar-wrap{margin-top:10px;background:var(--border);border-radius:3px;height:3px;}
.goal-bar{height:3px;border-radius:3px;background:var(--accent);}
/* Live unrealized cards — match top KPI font size */
.liveKpiGrid .kpi .v{font-size:26px!important;}
.liveKpiGrid .kpi .l{letter-spacing:1px;}
/* Recent transactions — match Best/Worst items typography exactly */
.recentTx th{padding:9px 10px;letter-spacing:1px;}
.recentTx td{padding:9px 10px;}
.recentTx td .itemCell span{font-size:13px;font-weight:600;}
.recentTx td.num{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;}
.recentTx .icon{width:24px;height:24px;}
.recentTx .pill{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:3px 8px;border-radius:5px;text-transform:lowercase;letter-spacing:0;line-height:1.5;}
.recentTx .pill.ok{color:var(--accent);border-color:rgba(0,217,166,.2);background:rgba(0,217,166,.1);}
.recentTx .pill.warn{color:var(--red);border-color:rgba(255,77,90,.25);background:rgba(255,77,90,.1);}
.txPager{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 4px 2px;flex-wrap:wrap}
.txPagerInfo{color:var(--muted);font-size:12px;font-family:'DM Mono',monospace}
.txPagerBtns{display:flex;align-items:center;gap:10px}
.txPageNum{color:var(--muted);font-size:12px;min-width:96px;text-align:center;font-family:'DM Mono',monospace}
.txPageBtn{padding:6px 13px;font-size:12px}
.txPageBtn:disabled{opacity:.38;cursor:default}
.txPageBtn:disabled:hover{border-color:var(--line);color:var(--muted);background:rgba(15,23,36,.74)}
.statSplit{display:grid;grid-template-columns:1fr;gap:0}
.statSplitMain,.statSplitSide{min-width:0}
.statSplitSide{display:flex;flex-direction:column;gap:14px}
.statSplitSide .section{margin:0}
.statSplitMain .section:first-child{margin-top:24px}
@media(min-width:1181px){
  .statSplit{grid-template-columns:minmax(0,1.55fr) minmax(300px,1fr);gap:0 18px;align-items:stretch}
  .statSplitMain .section:first-child{margin-top:0}
  .statSplitSide .section:first-child{margin-top:0}
  .statSplitMain{display:flex;flex-direction:column}
  .statSplitMain .recentTx{flex:1;display:flex;flex-direction:column}
  .statSplitMain .recentTx>table{flex:0 0 auto}
  .statSplitMain .recentTx .txPager{margin-top:auto}
  .statSplitSide .tbl-card{flex:1;display:flex;flex-direction:column}
}
/* Stats tab */
.statsPage{width:100%;max-width:1600px;margin:0 auto 30px}
.statsHead{display:flex;align-items:center;justify-content:space-between;margin:6px 0 16px;flex-wrap:wrap;gap:12px}
.statsRanges{margin:0!important}
.statsHeadRight{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.statsRefresh{padding:9px 14px}
.statsRow2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.statsRow2>div{min-width:0}
.statsRow2 .section:first-child{margin-top:14px}
@media(max-width:1180px){.statsRow2{grid-template-columns:1fr}}
.sBars{display:flex;align-items:flex-end;gap:4px;height:172px}
.sBarCol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;min-width:0}
.sBarTrack{width:100%;height:140px;display:flex;align-items:flex-end;background:rgba(130,146,166,.06);border-radius:5px;overflow:hidden}
.sBar{width:100%;border-radius:5px 5px 0 0;transition:opacity .15s}
.sBarCol:hover .sBar{opacity:.8}
.sBar.pos{background:linear-gradient(180deg,#00e6a8,#00b386)}
.sBar.neg{background:linear-gradient(180deg,#ff646f,#c0392b)}
.sBarLbl{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap}
.statsGroupLbl{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin:30px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.statsGroupLbl:first-of-type{margin-top:24px}
.statsRow2>div{display:flex;flex-direction:column}
.statsRow2>div>.card{flex:1}
.statsRow2 .section,.statsRow2 .section:first-child{margin:0 0 8px!important;font-size:13px;font-weight:600;color:var(--text)}
.statsChartCard{justify-content:flex-end}
.statsSubnav{margin:8px 0 6px}
.recentTx th.sortable{user-select:none;white-space:nowrap}
.tfmpHead{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.tfmpChips{margin:0!important;padding:4px!important;border-radius:14px!important}
.tfmpChips button{padding:7px 12px!important}
/* ===== Stats tab v2 (revamp) ===== */
.statsHeadV2{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:4px 0 16px;flex-wrap:wrap}
.statsHeadV2 .stTitle{font-size:23px;font-weight:850;letter-spacing:-.03em;color:var(--text);display:flex;align-items:center;gap:11px}
.statsHeadV2 .stRangeTag{font-size:12px;font-weight:750;color:#04140c;background:linear-gradient(180deg,#00e6a8,#22c55e);padding:3px 11px;border-radius:999px;letter-spacing:0}
.statsControls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.statSeg{display:inline-flex;align-items:center;gap:2px;padding:3px;background:var(--card2);border:1px solid var(--border);border-radius:12px}
.statSeg button{padding:7px 13px!important;border:0!important;background:transparent!important;color:var(--muted)!important;border-radius:9px!important;font-size:12.5px;font-weight:750}
.statSeg button:hover{color:var(--text)!important;background:rgba(125,211,252,.06)!important}
.statSeg button.on{background:rgba(0,217,166,.16)!important;color:#7ff0d0!important;box-shadow:inset 0 0 0 1px rgba(0,217,166,.3)}
.statDayBox{display:inline-flex;align-items:center;gap:1px;padding:3px;border-radius:12px;background:var(--card2);border:1px solid var(--border)}
.statDayBox.on{border-color:rgba(0,217,166,.45);box-shadow:0 0 0 3px rgba(0,217,166,.08)}
.statDayBox button{padding:4px 9px!important;font-size:15px!important;line-height:1;font-weight:800;border:0!important;background:transparent!important;color:var(--muted)!important;border-radius:8px!important;min-width:0}
.statDayBox button:hover:not(:disabled){color:var(--text)!important}
.statDayBox button:disabled{opacity:.3;cursor:not-allowed}
.statDayInput{background:transparent;border:0;color:var(--text);font:inherit;font-size:12px;font-weight:750;padding:4px 2px;cursor:pointer;text-align:center;color-scheme:dark;width:64px}
.statDayBox.on .statDayInput{color:#7ff0d0}
.statDayInput:focus{outline:none}
.statDayInput::-webkit-calendar-picker-indicator{filter:invert(.7);opacity:.5;cursor:pointer}
.statDayInput::-webkit-calendar-picker-indicator:hover{opacity:1}
.statRefresh{padding:8px 14px!important}
.statTabs{display:flex;align-items:center;gap:4px;border-bottom:1px solid var(--line);margin:0 0 4px;flex-wrap:wrap}
.statTabs button{padding:10px 17px!important;border:0!important;background:transparent!important;border-radius:0!important;color:var(--muted)!important;font-weight:800;font-size:13.5px;border-bottom:2px solid transparent!important;margin-bottom:-1px}
.statTabs button:hover{color:var(--text)!important;background:transparent!important}
.statTabs button.on{color:var(--text)!important;border-bottom-color:var(--accent)!important}
.statTabHint{font-size:12.5px;color:var(--muted);margin:9px 2px 20px;display:flex;align-items:center;gap:8px;line-height:1.4}
.statTabHint .hi{color:var(--accent);font-size:14px}
.statHeadline{display:grid;grid-template-columns:1.45fr 1fr 1fr 1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:1180px){.statHeadline{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:680px){.statHeadline{grid-template-columns:1fr}}
.statFacts{padding:0!important}
.statFactsTitle{font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted);padding:15px 16px 12px}
.statFactsGrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:1px;background:var(--line);border-top:1px solid var(--line)}
@media(max-width:1180px){.statFactsGrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:680px){.statFactsGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
.statFact{background:var(--card);padding:13px 16px;display:flex;flex-direction:column;gap:3px;min-width:0}
.statFact .sfLbl{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;font-weight:750;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.statFact .sfVal{font-size:18px;font-weight:850;color:var(--text);letter-spacing:-.02em;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.statFact .sfSub{font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.statSec{margin:28px 0 13px;display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:10px}
.statSec h3{margin:0;font-size:14.5px;font-weight:800;color:var(--text);letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.statSec .secHint{font-size:11.5px;color:var(--muted);font-weight:600}
.statSec:first-child{margin-top:6px}
.statCols2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:1180px){.statCols2{grid-template-columns:1fr}}
.statCols2>div{min-width:0;display:flex;flex-direction:column}
.statSubLbl{font-size:12.5px;font-weight:700;color:var(--text);margin:0 0 8px}
.statExplain{display:flex;gap:11px;align-items:flex-start;padding:14px 16px;border:1px solid rgba(245,166,35,.28);background:rgba(245,166,35,.06);border-radius:13px;margin:6px 0 18px;font-size:12.5px;line-height:1.55;color:#d8c8aa}
.statExplain .si{font-size:16px;line-height:1.3;flex-shrink:0}
.statExplain b{color:#ffd98a;font-weight:800}
.setNow{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:750;color:var(--accent);background:rgba(0,217,166,.1);border:1px solid rgba(0,217,166,.22);padding:2px 9px;border-radius:999px}
.statChartCard{padding:16px 16px 14px}
.sBarVal{font-size:9.5px;color:var(--faint);font-family:'DM Mono',monospace;height:12px;white-space:nowrap}
.sBarCol.noflip .sBarTrack{opacity:.4}
.sBar.best{background:linear-gradient(180deg,#7ff0d0,#00d9a6);box-shadow:0 0 10px rgba(0,217,166,.35)}
.statEmpty{padding:34px 18px;text-align:center;color:var(--muted)}
.statEmpty .ee{font-size:26px;display:block;margin-bottom:8px;opacity:.6}
/* ===== Market Insight tab ===== */
.miAi{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;letter-spacing:.02em}
.miAi.on{color:#7ff0d0;background:rgba(0,217,166,.12);border:1px solid rgba(0,217,166,.3)}
.miAi.off{color:var(--muted);background:rgba(130,146,166,.1);border:1px solid var(--line)}
.miMood{background:linear-gradient(180deg,rgba(0,217,166,.05),rgba(7,16,29,.92))!important;border-color:rgba(0,217,166,.24)!important}
.miMoodHd{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap}
.miMoodTxt{font-size:14.5px;line-height:1.55;color:var(--text)}
.miBuilding{font-size:11px;font-weight:700;color:#c4b5fd;animation:miPulse 1.3s ease-in-out infinite}
@keyframes miPulse{0%,100%{opacity:.5}50%{opacity:1}}
.miAge{font-size:11.5px;color:var(--amber);margin-top:8px;opacity:.9}
.miCostStrip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.miCostKpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.miCostKpi .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
.miCostKpi .val{font-size:22px;font-weight:800;font-family:'DM Mono',monospace;margin-top:3px}
.miCostKpi .sub{font-size:11px;color:var(--muted);margin-top:2px}
.miErr{font-size:11.5px;color:var(--amber);margin-top:8px}
/* Unified Market-Insight cards (watch list + predicted impact) */
.miGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;align-items:stretch}
.miCard{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;position:relative;overflow:hidden;transition:border-color .15s,transform .15s}
.miCard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.miCard:hover{border-color:var(--line2);transform:translateY(-1px)}
.miCard.mi-avoid::before{background:var(--red)} .miCard.mi-avoid{background:linear-gradient(180deg,rgba(255,77,90,.055),var(--card))}
.miCard.mi-watch::before{background:var(--amber)} .miCard.mi-watch{background:linear-gradient(180deg,rgba(245,166,35,.05),var(--card))}
.miCard.mi-opp::before{background:var(--accent)} .miCard.mi-opp{background:linear-gradient(180deg,rgba(0,217,166,.055),var(--card))}
.miCard.dir-up::before{background:var(--accent)} .miCard.dir-up{background:linear-gradient(180deg,rgba(0,217,166,.045),var(--card))}
.miCard.dir-down::before{background:var(--red)} .miCard.dir-down{background:linear-gradient(180deg,rgba(255,77,90,.045),var(--card))}
.miCard.dir-unc::before{background:var(--amber)} .miCard.dir-unc{background:linear-gradient(180deg,rgba(245,166,35,.04),var(--card))}
.miCardHd{display:flex;align-items:center;gap:10px}
.miCardIcon{position:relative;width:34px;height:34px;border-radius:9px;background:var(--card2);border:1px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden}
.miCardIcon .mono{position:absolute;font-weight:800;color:var(--muted);font-size:14px}
.miCardIcon img{position:relative;width:26px;height:26px;object-fit:contain}
.miCardId{min-width:0;flex:1}
.miCardName{font-size:14px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.miCardSub{font-size:11.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;display:flex;align-items:center;gap:5px}
.miMetrics{display:flex;align-items:center;font-size:12px;font-family:'DM Mono',monospace;margin:11px 0 9px;padding:8px 11px;background:var(--card2);border-radius:9px}
.miMetric{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:2px;align-items:flex-start;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.miMetric+.miMetric{border-left:1px solid var(--line);padding-left:11px;margin-left:11px}
.miMetric .lbl{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.04em}
.miReason{font-size:12.5px;line-height:1.5;color:var(--text);opacity:.92}
.miDriver{font-size:11px;color:var(--muted);margin-top:8px;border-left:2px solid rgba(125,211,252,.4);padding-left:8px}
.miSig{font-size:10px;font-weight:850;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:999px;flex:0 0 auto}
.miSig.mi-avoid{color:#ffb3b9;background:rgba(255,77,90,.14);border:1px solid rgba(255,77,90,.32)}
.miSig.mi-watch{color:#ffd98a;background:rgba(245,166,35,.14);border:1px solid rgba(245,166,35,.32)}
.miSig.mi-opp{color:#7ff0d0;background:rgba(0,217,166,.14);border:1px solid rgba(0,217,166,.32)}
.miIDir{font-size:11px;font-weight:850}
.miIDir.up{color:var(--accent)}.miIDir.down{color:var(--red)}.miIDir.unc{color:var(--amber)}
.miMag{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:999px;border:1px solid var(--line2);color:var(--muted);flex:0 0 auto}
.miMag.high{color:#ffb3b9;border-color:rgba(255,77,90,.32);background:rgba(255,77,90,.08)}
.miMag.medium{color:#ffd98a;border-color:rgba(245,166,35,.28)}
.miCardActs{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:13px}
.miConf{font-size:10px;color:var(--muted);margin-left:auto;text-transform:capitalize;font-style:italic}
.miBtn{font-size:11.5px;font-weight:750;padding:7px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--card2);color:var(--text);cursor:pointer;white-space:nowrap}
.miBtn:hover{border-color:var(--muted)}
.miBtn.temp{background:rgba(245,166,35,.13);border-color:rgba(245,166,35,.34);color:#ffd98a}
.miBtn.temp:hover{background:rgba(245,166,35,.2)}
.miBtn.ghost{background:transparent}
.miBtn:disabled{opacity:.5;cursor:default}
.miBlocked{font-size:11px;color:var(--muted);font-style:italic}
.miCites{display:flex;flex-direction:column;gap:4px;margin-top:10px}
.miCite{font-size:11px;color:var(--muted);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:2px 0 2px 8px;border-left:2px solid var(--line2)}
.miCite:hover{color:var(--text)}
.miCite.upd{border-left-color:rgba(125,211,252,.5)}
.miCite.thr{border-left-color:rgba(167,139,250,.5)}
.miNarrLink{font-size:13.5px;font-weight:750;color:var(--text);text-decoration:none}
.miNarrLink:hover{color:var(--accent);text-decoration:underline}
.miTabN{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;margin-left:7px;border-radius:999px;background:var(--card2);border:1px solid var(--line2);font-size:10.5px;font-weight:800;color:var(--muted);vertical-align:middle}
.statTabs button.on .miTabN{background:rgba(0,217,166,.16);border-color:rgba(0,217,166,.3);color:#7ff0d0}
.miNarrGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.miNarr{padding:14px 15px}
.miNarrHd{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap}
.miNarrHd b{font-size:13.5px}
.miNarrTxt{font-size:12.5px;line-height:1.55;color:var(--muted)}
.miSrc{font-size:9.5px;font-weight:850;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:6px;border:1px solid}
.miSrc.src-update{color:#7dd3fc;background:rgba(125,211,252,.12);border-color:rgba(125,211,252,.3)}
.miSrc.src-rumor{color:#c4b5fd;background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.32)}
.miSrc.src-market{color:#ffd98a;background:rgba(245,166,35,.13);border-color:rgba(245,166,35,.3)}
.miTag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-left:auto}
.miChips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.miChip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;background:rgba(125,211,252,.08);border:1px solid var(--line2);color:var(--text)}
.miSrcCard{padding:6px}
.miSrcRow{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:9px;text-decoration:none;color:var(--text);border-bottom:1px solid var(--line)}
.miSrcRow:last-child{border-bottom:0}
.miSrcRow:hover{background:rgba(125,211,252,.06)}
.miSrcCat{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:rgba(130,146,166,.1);padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;min-width:62px;text-align:center}
.miSrcScore{font-size:11px;font-weight:800;color:var(--muted);font-family:'DM Mono',monospace;min-width:48px;flex-shrink:0}
.miSrcTitle{font-size:12.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.statCols2>div>.card{flex:1}
.statSubLbl.green{color:#7ff0d0!important}.statSubLbl.red{color:#ff8a93!important}
td.statEmpty{text-align:center}
/* Flip Finder tab */
.blKpiStrip.ff5{grid-template-columns:repeat(5,minmax(0,1fr))}
@media(max-width:1100px){.blKpiStrip.ff5{grid-template-columns:repeat(2,1fr)}}
.ffScore{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-weight:700;font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid;white-space:nowrap}
.ffScore.gA{color:#7ff0d0;border-color:rgba(0,217,166,.4);background:rgba(0,217,166,.1)}
.ffScore.gB{color:#a5e8b0;border-color:rgba(120,220,130,.35);background:rgba(120,220,130,.08)}
.ffScore.gC{color:#ffe08a;border-color:rgba(255,200,90,.35);background:rgba(255,200,90,.08)}
.ffScore.gD{color:#ffc187;border-color:rgba(255,160,80,.35);background:rgba(255,160,80,.08)}
.ffScore.gE,.ffScore.gF{color:#ffb3b9;border-color:rgba(255,77,90,.35);background:rgba(255,77,90,.08)}
.ffFlag{display:inline-block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:999px;margin-left:6px;vertical-align:1px;white-space:nowrap}
.ffFlag.dump,.ffFlag.manip_risk{color:#ffb3b9;border:1px solid rgba(255,77,90,.35);background:rgba(255,77,90,.1)}
.ffFlag.spike{color:#ffe08a;border:1px solid rgba(255,200,90,.35);background:rgba(255,200,90,.08)}
.ffFlag.one_sided,.ffFlag.stale{color:var(--muted);border:1px solid var(--line2);background:rgba(125,211,252,.04)}
.ffName{cursor:pointer}.ffName:hover>span{text-decoration:underline}
.ffIn{height:38px;width:120px}
.ffInLbl{display:flex;flex-direction:column;gap:3px;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.ffSellRow td{background:rgba(125,211,252,.05)!important}
.ffSellForm{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:4px 0}
.ffSellForm .ffIn{width:140px}
.ffAddGrid{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-top:10px}
.ffPickedItem{display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 12px;border:1px solid var(--line2);border-radius:10px;background:rgba(125,211,252,.06);font-weight:700}
.ffTargetBar{height:4px;border-radius:99px;background:rgba(125,211,252,.12);margin-top:4px;overflow:hidden}
.ffTargetBar>div{height:100%;border-radius:99px;background:linear-gradient(90deg,#38bdf8,#00d9a6)}
.ffMore{display:block;width:100%;padding:11px;text-align:center;background:rgba(125,211,252,.05);border:0;border-top:1px solid var(--line);color:var(--muted);font-weight:700;cursor:pointer}
.ffMore:hover{background:rgba(125,211,252,.1);color:var(--text)}
.ffSpark{width:60px;height:16px;display:block;margin-left:auto}
.ffStar{background:transparent;border:0;cursor:pointer;font-size:15px;color:var(--muted);padding:2px 5px;vertical-align:middle}
.ffStar.on{color:#ffd75e}
.ffStar:hover{color:#ffe9a8}
.ffActs{white-space:nowrap}
.ffActs .blAct{padding:6px 9px!important}
.gold{color:#ffd75e}
.ffFlag.dip_buy{color:#7ff0d0;border:1px solid rgba(0,217,166,.4);background:rgba(0,217,166,.12)}
.ffFlag.falling_knife,.ffFlag.overheated{color:#ffb3b9;border:1px solid rgba(255,77,90,.35);background:rgba(255,77,90,.1)}
.ffFlag.unusual_vol{color:#ffe08a;border:1px solid rgba(255,200,90,.35);background:rgba(255,200,90,.08)}
.ffBtBtn{margin-left:auto;border-color:rgba(125,211,252,.34)!important;color:#cfe9ff!important}
.btWrap{display:flex;flex-direction:column;gap:14px}
.btTitle{font-size:11px;letter-spacing:.07em;text-transform:uppercase;font-weight:800;color:var(--muted)}
.btBlock{border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:rgba(7,16,29,.5)}
.btHead{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px}
.btHeadline{font-size:18px;font-weight:900;letter-spacing:-.02em;margin-bottom:12px;color:var(--text)}
.btHeadline.green{color:var(--green)}.btHeadline.amber{color:var(--amber)}.btHeadline.red{color:var(--red)}
.btGrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
@media(max-width:1180px){.btGrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:680px){.btGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
.btMetric{border:1px solid var(--line);border-radius:10px;padding:10px 11px;background:rgba(15,23,36,.4)}
.btLabel{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:800;color:var(--muted)}
.btVal{font-size:18px;font-weight:900;letter-spacing:-.03em;color:var(--text);margin-top:5px}
.btSub{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.3}
.btCaveats{font-size:12px;color:var(--muted)}
.btCaveats summary{cursor:pointer;font-weight:700;color:#9fb0c2}
.btCaveats ul{margin:8px 0 0;padding-left:18px;display:flex;flex-direction:column;gap:4px}
.btBtns{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
.ffApplyAll{border-color:rgba(0,217,166,.45)!important;color:#7ff0d0!important;font-weight:800}
.ffReset{border-color:rgba(255,77,90,.35)!important;color:#ffb3b9!important}
.ffTuneBtn{border-color:rgba(186,140,255,.4)!important;color:#dcccff!important}
.calGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:11px;margin-top:4px}
@media(max-width:1180px){.calGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:680px){.calGrid{grid-template-columns:1fr}}
.calField{display:flex;flex-direction:column;gap:4px}
.calK{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.03em}
.calField input{width:100%}
.calHint{font-size:10px;color:var(--muted)}
/* Self-competition warning banner (main dashboard) */
.scbBanner{position:relative;border-color:rgba(251,191,36,.5)!important;background:rgba(251,191,36,.08)!important}
.scbHead{font-size:14px;font-weight:850;color:var(--amber);padding-right:28px}
.bannerX{position:absolute;top:9px;right:10px;width:24px;height:24px;padding:0!important;display:inline-grid;place-items:center;font-size:13px;line-height:1;border-radius:7px!important;background:rgba(255,255,255,.04)!important;border:1px solid var(--line)!important;color:var(--muted)!important;opacity:.7}
.bannerX:hover{opacity:1;color:var(--text)!important;background:rgba(255,255,255,.09)!important}
.bannerMin{right:40px}
/* Attention bell (topbar) — always visible alert hub */
.attnBell{position:relative;color:var(--amber)}
.attnBell.sevRed{color:var(--red)}
.attnBell.sevAmber{color:var(--amber)}
.attnBell.quiet{color:var(--muted);opacity:.7}
.attnBell.quiet .bellBadge{display:none}
.attnBell:hover{border-color:rgba(125,211,252,.38);opacity:1}
.attnBell .bellBadge{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--red);color:#fff;font-size:10px;font-weight:850;line-height:16px;text-align:center;box-shadow:0 0 0 2px var(--bg)}
.attnBell.sevAmber .bellBadge{background:var(--amber);color:#1a1003}
@keyframes bellPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.attnBell.sevRed svg{animation:bellPulse 1.6s ease-in-out infinite}
.attnBell.open{border-color:rgba(125,211,252,.45);opacity:1}
/* Alert centre — bell-anchored flyout panel */
.alertWrap{position:relative;display:inline-flex}
.alertPanel{position:absolute;top:calc(100% + 9px);right:0;width:392px;max-width:92vw;max-height:74vh;overflow-y:auto;background:var(--card);border:1px solid var(--line2);border-radius:14px;box-shadow:0 18px 54px rgba(0,0,0,.55);z-index:140}
.alertPanel.hidden{display:none}
.alPanelHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);border-radius:14px 14px 0 0;z-index:1}
.alPanelTitle{font-size:13.5px;font-weight:850}
.alPanelCount{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--line2);color:var(--text);font-size:10.5px;font-weight:800;margin-left:3px;vertical-align:middle}
.alLink{background:none!important;border:0!important;color:var(--accent)!important;font-size:11.5px;font-weight:700;padding:2px 4px!important;cursor:pointer}
.alLink:hover{text-decoration:underline}
.alList{padding:9px}
.alEmpty{padding:36px 16px;text-align:center;color:var(--muted);font-size:12.5px}
.alItem{position:relative;border:1px solid var(--line);border-left:3px solid var(--muted);border-radius:11px;background:var(--card2);padding:11px 12px;margin-bottom:9px}
.alItem:last-child{margin-bottom:0}
.alItem.sev-red{border-left-color:var(--red)}
.alItem.sev-amber{border-left-color:var(--amber)}
.alItem.sev-teal{border-left-color:var(--accent)}
.alItem.sev-violet{border-left-color:#a78bfa}
.alItem.read{opacity:.52}
.alHead{display:flex;align-items:flex-start;gap:7px}
.alIcon{font-size:13px;line-height:1.35;flex:0 0 auto}
.alTitle{flex:1;min-width:0;font-size:12.5px;font-weight:800;color:var(--text);line-height:1.35}
.alItem.sev-red .alTitle{color:#ff8a93}
.alItem.sev-amber .alTitle{color:var(--amber)}
.alItem.sev-teal .alTitle{color:var(--accent)}
.alItem.sev-violet .alTitle{color:#c4b5fd}
.alBtns{display:flex;gap:4px;flex:0 0 auto}
.alX{width:22px;height:22px;padding:0!important;display:inline-grid;place-items:center;font-size:11px;line-height:1;border-radius:6px!important;background:rgba(255,255,255,.04)!important;border:1px solid var(--line)!important;color:var(--muted)!important}
.alX:hover{color:var(--text)!important;background:rgba(255,255,255,.09)!important}
.alSub{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.42}
.alBody{margin-top:8px;font-size:12.5px}
.alBody .lrRow{margin-bottom:6px}
.alActs{margin-top:10px}
.alAct{padding:6px 12px!important;font-size:11.5px;border-radius:8px!important}
/* New-update heads-up — identical to the stale/duplicate banners, in teal */
.uaBanner{position:relative;border-color:rgba(0,217,166,.5)!important;background:rgba(0,217,166,.07)!important}
.uaBanner.rumour{border-color:rgba(167,139,250,.5)!important;background:rgba(167,139,250,.07)!important}
.uaHead{font-size:14px;font-weight:850;color:var(--accent);padding-right:28px}
.uaBanner.rumour .uaHead{color:#c4b5fd}
.uaItems{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:12.5px}
.uaItem{font-size:11px;font-weight:700;color:var(--text);background:rgba(15,23,36,.55);border:1px solid var(--line2);padding:2px 9px;border-radius:999px}
.uaSee{margin-left:auto;padding:6px 13px!important;font-size:12px;border-radius:9px!important}
/* FC rank-goal card (Bankroll) */
.rankGoalCard{border-color:rgba(0,217,166,.32)!important;background:linear-gradient(180deg,rgba(0,217,166,.06),rgba(7,16,29,.9))!important}
.rgTop{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:11px;flex-wrap:wrap}
.rgCur{font-size:27px;font-weight:900;letter-spacing:-.03em;color:var(--text);line-height:1}
.rgSub{font-size:12px;color:var(--muted);margin-top:4px}
.rgRemain{font-size:13px;font-weight:850;color:var(--accent);white-space:nowrap}
.rgBarWrap{height:11px;border-radius:7px;background:rgba(130,146,166,.12);overflow:hidden}
.rgBar{height:100%;border-radius:7px;background:linear-gradient(90deg,#00b389,#00e6a8)}
.rgEta{font-size:12.5px;color:var(--muted);margin-top:10px}
.rgEta b{color:var(--text)}
/* ── Headline goal tracker (Bankroll) ── */
.goalCard{position:relative;overflow:hidden;border-color:rgba(245,166,35,.34)!important;background:radial-gradient(120% 140% at 0% 0%,rgba(245,166,35,.10),rgba(0,217,166,.05) 45%,rgba(7,16,29,.94) 80%)!important;box-shadow:0 0 0 1px rgba(245,166,35,.10),0 18px 50px -28px rgba(245,166,35,.5)!important}
.goalCard.gReached{border-color:rgba(0,217,166,.5)!important;background:radial-gradient(120% 140% at 0% 0%,rgba(0,217,166,.16),rgba(7,16,29,.94) 78%)!important}
.goalGlow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(60% 90% at 100% 0%,rgba(0,217,166,.10),transparent 60%);opacity:.9}
.goalHead{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.goalCrest{font-size:26px;line-height:1;filter:drop-shadow(0 2px 6px rgba(245,166,35,.5))}
.goalTitle{font-size:17px;font-weight:900;letter-spacing:-.02em;color:var(--text)}
.goalRank{font-size:11.5px;font-weight:700;color:var(--muted);margin-top:3px}
.goalRank b{color:#ffce6b;font-weight:800}
.gRare{color:#ff9ed8;font-weight:800}
.gInline{display:inline-flex;align-items:center;gap:5px;vertical-align:middle}

.mswBanner{position:relative;border-color:rgba(245,166,35,.5)!important;background:rgba(245,166,35,.07)!important}
.mswHead{font-size:14px;font-weight:850;color:var(--amber);padding-right:28px}
.mswItems{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:12.5px}

.recentTx .tblScroll{max-height:430px;overflow:auto}

.pace{padding:18px 28px!important;gap:0!important;}
.pace-dot{margin-right:10px;}
.pace-status{margin-right:28px!important;}
.pace-pipe{margin:0 24px!important;}
.selling{padding:16px 28px!important;}

function makeSpark(values,color,times,kind){if(!values||values.length<2)return'';let mn=Math.min(...values),mx=Math.max(...values),rng=mx-mn||1,W=100,H=100,pad=16;let ys=[];let pts=values.map((v,i)=>{let x=(i/(values.length-1))*W,y=H-pad-((v-mn)/rng)*(H-pad*2);ys.push(Math.round(y*10)/10);return`${x.toFixed(2)},${y.toFixed(2)}`});let line=pts.map((p,i)=>(i===0?'M':'L')+p).join(' ');let area=`${line} L${W},${H} L0,${H} Z`;let id='sg'+Math.random().toString(36).slice(2);let data=esc(JSON.stringify({v:values,t:times||[],y:ys,k:kind||'profit'}));return`<svg class="kpi-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" data-spark="${data}"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.14"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#${id})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/></svg>`}

function marketSpeedCard(){let m=DATA?.market_speed||{};let isBad=m.status==='slow'||m.status==='very_slow';let isGood=m.status==='fast'||m.status==='very_fast';let dotColor=isBad?'var(--amber)':isGood?'var(--accent)':'var(--text)';let statusColor=isBad?'var(--amber)':isGood?'var(--accent)':'var(--text)';

// ===== Alert centre =====
// Every live warning (stale offers, duplicate-sells, market swings, loss-radar,
// OSRS updates) is folded into one bell-anchored flyout panel instead of flooding
// the dashboard with banners. Read / dismissed state is tracked per underlying
// item and persisted in localStorage, so: a resolved-then-recurring item re-alerts,
// and "dismiss" hides a warning until a genuinely new instance shows up.
let ALERT_OPEN=false,UPDATE_ALERT_DISMISSED=new Set();
function alLoad(k){try{return new Set(JSON.parse(localStorage.getItem(k)||'[]'))}catch(e){return new Set()}}
function alSave(k,s){try{localStorage.setItem(k,JSON.stringify([...s]))}catch(e){}}
let ALERT_READ=alLoad('alertRead'),ALERT_DISMISSED=alLoad('alertDismissed');
function staleOfferKey(s){return s.account_hash+'|'+s.slot+'|'+s.item_id}
function lossRadarKey(r){return r.account+'|'+r.item_id}
function marketAlertKey(a){return String(a.item_id)}
// Build every active alert category from the live data (one entry per warning type).
function collectAlerts(){
  let cats=[];
  // Stale / stuck offers
  let stale=DATA?.stale_offers||[];
  if(stale.length){
    let body=stale.slice(0,12).map(s=>{
      let st=String(s.state||'').toUpperCase();
      let cls=st==='SELLING'?'sell':st==='BUYING'?'buy':'';
      let lbl=st==='SELLING'?'sell':st==='BUYING'?'buy':'bought';
      return `<span class="soItem">${itemIcon(s.item,s)}<b>${esc(s.item||'')}</b><span class="soState ${cls}">${lbl}</span><span class="muted">· ${esc(s.account||'')}</span><span class="soAge">· ${durLabel(num(s.age_minutes)/60)} stuck</span></span>`;
    }).join('');
    cats.push({id:'stale',sev:'red',icon:'⚠',keys:stale.map(s=>'stale::'+staleOfferKey(s)),
      title:`${stale.length} stale offer${stale.length>1?'s':''}`,
      sub:'Sitting past your timeframe threshold — FC may have forgotten them; check &amp; re-list.',
      body:`<div class="soItems">${body}</div>`});
  }
  // Duplicate sells (self-competition)
  let comp=DATA?.sell_competition||[];
  if(comp.length){
    let body=comp.slice(0,8).map(c=>`<span class="scbItem">${itemIcon(c.item,c)}<b>${esc(c.item||'')}</b><span class="muted"> · ${c.n_accounts} accts (${esc(c.accounts.join(', '))})</span></span>`).join('');
    cats.push({id:'selfcomp',sev:'amber',icon:'⚠',keys:comp.map(c=>'selfcomp::'+String(c.item_id)),
      title:`Selling the same item on ${comp.length>1?comp.length+' items':'2+ accounts'}`,
      sub:'You may be undercutting yourself across accounts.',
      body:`<div class="scbItems">${body}</div>`});
  }
  // Market swings
  let al=DATA?.market_alerts||[];
  if(al.length){
    let body=al.slice(0,12).map(a=>`<span class="mswItem">${itemIcon(a.item,a)}<b>${esc(a.item||'')}</b><span class="mswPct ${num(a.change_24h_pct)<0?'red':'green'}">${num(a.change_24h_pct)>0?'+':''}${a.change_24h_pct}% 24h</span><span class="muted">· ${esc(a.reason||'')}</span></span>`).join('');
    cats.push({id:'swing',sev:'amber',icon:'⚠',keys:al.map(a=>'swing::'+marketAlertKey(a)),
      title:`${al.length} item${al.length>1?'s':''} swinging hard`,
      sub:'Consider temp-blocking until they settle (updates / rumours / market moves).',
      body:`<div class="mswItems">${body}</div>`,
      actions:`<button class="save alAct" onclick="openMarketInsight()">Review in Market Insight →</button>`});
  }
  // Loss radar
  let rl=DATA?.loss_radar||[];
  if(rl.length){
    let high=rl.filter(r=>r.level==='high').length;
    let body=rl.slice(0,10).map(r=>`<div class="lrRow ${esc(r.level)}">${itemIcon(r.item,r)}
      <div class="lrMain"><div><b>${esc(r.item)}</b> <span class="muted tiny">${esc(r.account)} · ${esc((r.state||'').toLowerCase())}</span></div>
      <div class="lrWhy">${(r.reasons||[]).map(esc).join(' · ')}</div></div>
      <div class="lrCap">${fmtGp(r.capital)}<div class="muted tiny">at risk</div></div>
      <div class="lrActs">${r.item_id&&!r.blocked?`<button class="blAct temp" ${BL_BUSY?'disabled':''} title="Temp-block this item" onclick="tempBlockItem(${r.item_id},BL_TEMP_MIN)">⏱</button>`:''}${r.item_id?`<button class="blAct" onclick="openItemPage({slug:'${esc(r.slug||r.item_id)}'})">Open ›</button>`:''}</div></div>`).join('');
    cats.push({id:'radar',sev:high?'red':'amber',icon:'🎯',keys:rl.map(r=>'radar::'+lossRadarKey(r)),
      title:`Loss radar — ${rl.length} position${rl.length>1?'s':''} at risk${high?` · ${high} high`:''}`,
      sub:'Matches your big-loss pattern (aged · oversized · thin liquidity · below cost). Re-list lower or cut before it bleeds.',
      body:body});
  }
  // OSRS update / rumour heads-up
  let u=DATA?.insight_alert||{};
  if(u.new&&u.key){
    let isUpd=u.kind==='update';
    let items=(u.items||[]).slice(0,6).map(i=>`<span class="uaItem">${esc(i)}</span>`).join('');
    let why=(!isUpd&&u.why)?`<span class="muted tiny">${esc(u.why)} · </span>`:'';
    cats.push({id:'update',sev:isUpd?'teal':'violet',icon:isUpd?'📣':'📰',keys:['update::'+u.key],
      title:(isUpd?'New OSRS update — ':'Rumour worth watching — ')+esc(u.title||''),
      sub:'',
      body:`<div class="uaItems">${why}${items?`<span class="muted">affects</span>${items}`:''}</div>`,
      actions:`<button class="save alAct" onclick="openUpdateImpact()">See impact →</button>`});
  }
  // Prune stored read/dismissed state down to keys that are still live, then drop
  // fully-dismissed categories and compute per-category read state.
  let liveKeys=new Set();cats.forEach(c=>c.keys.forEach(k=>liveKeys.add(k)));
  let pr=new Set([...ALERT_READ].filter(k=>liveKeys.has(k)));
  let pd=new Set([...ALERT_DISMISSED].filter(k=>liveKeys.has(k)));
  if(pr.size!==ALERT_READ.size){ALERT_READ=pr;alSave('alertRead',ALERT_READ)}
  if(pd.size!==ALERT_DISMISSED.size){ALERT_DISMISSED=pd;alSave('alertDismissed',ALERT_DISMISSED)}
  return cats.filter(c=>{
    c.keys=c.keys.filter(k=>!ALERT_DISMISSED.has(k));
    c.unread=c.keys.filter(k=>!ALERT_READ.has(k)).length;
    c.read=c.keys.length>0&&c.unread===0;
    return c.keys.length>0;
  });
}
function alertMarkRead(id){let c=collectAlerts().find(x=>x.id===id);if(c){c.keys.forEach(k=>ALERT_READ.add(k));alSave('alertRead',ALERT_READ);render()}}
function alertDismiss(id){let c=collectAlerts().find(x=>x.id===id);if(c){c.keys.forEach(k=>ALERT_DISMISSED.add(k));alSave('alertDismissed',ALERT_DISMISSED);if(id==='update')ackUpdateAlert(true);render()}}
function alertMarkAllRead(){collectAlerts().forEach(c=>c.keys.forEach(k=>ALERT_READ.add(k)));alSave('alertRead',ALERT_READ);render()}
function toggleAlertPanel(e){if(e)e.stopPropagation();ALERT_OPEN=!ALERT_OPEN;updateAttnBell()}

async function ackUpdateAlert(silent){

  if(DATA?.insight_alert)DATA.insight_alert.new=false;

}

// Topbar bell — lit while unread warnings exist — and its flyout alert panel.
function updateAttnBell(){
  let bell=$('attnBell');if(!bell)return;
  let cats=collectAlerts();
  let unreadCats=cats.filter(c=>!c.read);
  let unread=unreadCats.reduce((s,c)=>s+c.unread,0);
  bell.classList.remove('hidden');
  let badge=$('bellBadge');
  if(!unread){bell.classList.add('quiet');bell.classList.remove('sevRed','sevAmber');if(badge)badge.textContent='';}
  else{bell.classList.remove('quiet');let red=unreadCats.some(c=>c.sev==='red');bell.classList.toggle('sevRed',red);bell.classList.toggle('sevAmber',!red);if(badge)badge.textContent=unread;}
  bell.title=cats.length?`${cats.length} alert${cats.length>1?'s':''}${unread?` · ${unread} unread`:''} · click to open`:'No alerts';
  let panel=$('alertPanel');if(!panel)return;
  panel.classList.toggle('hidden',!ALERT_OPEN);bell.classList.toggle('open',ALERT_OPEN);
  if(!ALERT_OPEN)return;
  let head=`<div class="alPanelHead"><span class="alPanelTitle">Alerts${cats.length?` <span class="alPanelCount">${cats.length}</span>`:''}</span>${cats.some(c=>!c.read)?`<button class="alLink" onclick="alertMarkAllRead()">Mark all read</button>`:''}</div>`;
  let list;
  if(!cats.length)list=`<div class="alEmpty">🔔 No alerts — you're all clear.</div>`;
  else{
    cats.sort((a,b)=>(a.read?1:0)-(b.read?1:0));
    list=cats.map(c=>`<div class="alItem sev-${c.sev}${c.read?' read':''}">
      <div class="alHead"><span class="alIcon">${c.icon}</span><span class="alTitle">${c.title}</span>
        <span class="alBtns">${c.read?'':`<button class="alX" title="Mark read" onclick="alertMarkRead('${c.id}')">✓</button>`}<button class="alX" title="Dismiss — reappears if it recurs" onclick="alertDismiss('${c.id}')">✕</button></span></div>
      ${c.sub?`<div class="alSub">${c.sub}</div>`:''}
      <div class="alBody">${c.body}</div>
      ${c.actions?`<div class="alActs">${c.actions}</div>`:''}
    </div>`).join('');
  }
  panel.innerHTML=head+`<div class="alList">${list}</div>`;
}
